<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NBA Tonight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>

    /* ═══════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════ */
    :root {
      --bg:      #000812;
      --surface: #060F1C;
      --card:    rgba(255,255,255,0.03);
      --border:  rgba(70,150,230,0.1);

      --orange:        #FF5200;
      --orange-dim:    rgba(255,82,0,0.14);
      --orange-glow:   rgba(255,82,0,0.38);

      --gold:          #FFA800;
      --gold-dim:      rgba(255,168,0,0.12);
      --gold-border:   rgba(255,168,0,0.28);

      --purple:        #A87EFF;
      --purple-dim:    rgba(168,126,255,0.1);
      --purple-border: rgba(168,126,255,0.24);

      --green:         #00E676;
      --green-dim:     rgba(0,230,118,0.1);
      --green-border:  rgba(0,230,118,0.24);

      --red:    #FF4444;
      --text:   #D8E8F4;
      --muted:  #2E4560;
      --soft:   #6688AA;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* Ambient gradient */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(255,82,0,.07)    0%, transparent 55%),
        radial-gradient(ellipse 60% 60% at 90% 100%, rgba(0,180,255,.04)   0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%,  rgba(70,130,220,.025) 0%, transparent 60%);
    }

    /* Dot-grid texture */
    body::after {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(70,140,210,0.07) 1px, transparent 1px);
      background-size: 30px 30px;
    }


    /* ═══════════════════════════════════════
       AUTH SCREEN
    ═══════════════════════════════════════ */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; position: relative; z-index: 1;
    }

    .auth-card {
      position: relative;
      background: rgba(6,15,28,0.92);
      backdrop-filter: blur(24px) saturate(1.2);
      border: 1px solid rgba(70,150,230,0.13);
      padding: 52px 44px 44px;
      width: 400px; max-width: 93vw;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 80px rgba(0,0,0,0.7),
        0 0 80px rgba(255,82,0,0.04);
    }

    /* Corner accent brackets */
    .auth-card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 24px; height: 24px;
      border-top: 2px solid var(--orange);
      border-left: 2px solid var(--orange);
      pointer-events: none;
    }
    .auth-card-corner-br {
      position: absolute;
      bottom: -1px; right: -1px;
      width: 24px; height: 24px;
      border-bottom: 2px solid var(--orange);
      border-right: 2px solid var(--orange);
      pointer-events: none;
    }

    .auth-logo { text-align: center; margin-bottom: 36px; }
    .auth-logo .ball { font-size: 30px; display: block; }
    .auth-logo h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 42px; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase;
      color: #fff; line-height: 1;
      margin-top: 12px;
    }
    .auth-logo h1 .nba-word { color: var(--orange); }
    .auth-logo p {
      font-size: 10px; color: var(--muted);
      margin-top: 8px; letter-spacing: 3px; text-transform: uppercase;
    }

    .auth-toggle {
      display: flex; margin-bottom: 28px;
      border: 1px solid rgba(70,150,230,0.13);
      overflow: hidden;
    }
    .auth-toggle button {
      flex: 1; padding: 11px; background: transparent; border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all .2s;
    }
    .auth-toggle button.active { background: var(--orange); color: #fff; }
    .auth-toggle button:not(.active):hover { color: var(--soft); }

    .auth-field { margin-bottom: 18px; }
    .auth-field label {
      display: block; font-size: 9px; color: var(--muted);
      margin-bottom: 8px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
    }
    .auth-field input {
      width: 100%; padding: 13px 15px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(70,150,230,0.12);
      color: var(--text); font-size: 14px; outline: none;
      transition: border-color .2s, background .2s;
      font-family: 'DM Sans', sans-serif;
    }
    .auth-field input::placeholder { color: var(--muted); }
    .auth-field input:focus {
      border-color: var(--orange);
      background: rgba(255,82,0,0.03);
    }

    .btn-auth {
      width: 100%; padding: 15px;
      background: var(--orange); border: none;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; margin-top: 10px;
      box-shadow: 0 0 36px var(--orange-glow);
      transition: transform .2s, box-shadow .2s, filter .2s;
      position: relative; overflow: hidden;
    }
    .btn-auth::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 50%);
    }
    .btn-auth:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 60px var(--orange-glow);
      filter: brightness(1.08);
    }
    .btn-auth:disabled { opacity: .5; cursor: not-allowed; }

    .auth-error {
      color: var(--red); font-size: 12px; margin-top: 14px;
      text-align: center; min-height: 20px; font-weight: 500; letter-spacing: .5px;
    }


    /* ═══════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════ */
    #appShell { display: none; flex-direction: column; min-height: 100vh; }

    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      height: 56px;
      border-bottom: 1px solid rgba(70,150,230,0.08);
      background: rgba(0,8,18,0.92);
      backdrop-filter: blur(20px);
      position: sticky; top: 0; z-index: 100;
    }

    /* Thin top accent line */
    .app-header::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--orange) 20%,
        rgba(255,82,0,0.5) 60%,
        transparent 100%);
    }

    .header-brand {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 18px; font-weight: 900;
      letter-spacing: 3px; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
      user-select: none;
    }
    .header-brand .brand-nba { color: var(--orange); }
    .header-brand .brand-dot {
      width: 5px; height: 5px;
      background: var(--orange); border-radius: 50%;
      animation: blink 2.5s ease-in-out infinite;
    }

    .header-tabs { display: flex; }
    .tab-btn {
      padding: 0 20px; height: 56px;
      border: none; background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: color .2s;
      position: relative;
    }
    /* Animated underline */
    .tab-btn::after {
      content: '';
      position: absolute; bottom: 0; left: 20px; right: 20px; height: 2px;
      background: var(--orange);
      transform: scaleX(0) translateY(0);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      transform-origin: center;
    }
    .tab-btn.active { color: var(--text); }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:hover:not(.active) { color: var(--soft); }

    .btn-sair {
      padding: 7px 16px;
      border: 1px solid rgba(70,150,230,0.12); background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: color .2s, border-color .2s;
    }
    .btn-sair:hover { color: var(--red); border-color: rgba(255,68,68,0.3); }

    .tab-panel { display: none; position: relative; z-index: 1; }
    .tab-panel.active { display: block; animation: fadeUp .3s ease; }


    /* ═══════════════════════════════════════
       ABA ANÁLISE
    ═══════════════════════════════════════ */
    .wrap { max-width: 880px; margin: 0 auto; padding: 0 24px; }

    .wrap header {
      text-align: center;
      padding: 76px 0 40px;
      position: relative;
    }

    /* Crosshair decoration behind title */
    .wrap header::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 500px; height: 260px;
      background:
        linear-gradient(0deg,   transparent 49.7%, rgba(70,140,210,0.05) 50%, transparent 50.3%),
        linear-gradient(90deg,  transparent 49.7%, rgba(70,140,210,0.05) 50%, transparent 50.3%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: var(--orange); margin-bottom: 20px;
    }
    .eyebrow::before, .eyebrow::after {
      content: ''; display: block;
      width: 28px; height: 1px;
      background: currentColor; opacity: .5;
    }

    h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(64px, 11vw, 108px);
      font-weight: 900; letter-spacing: -1px; line-height: .88;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 18px;
    }
    h1 em {
      font-style: italic;
      background: linear-gradient(135deg, var(--orange) 0%, #FFB200 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline { color: var(--soft); font-size: 14px; line-height: 1.65; max-width: 460px; margin: 0 auto; }

    .date-chip {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 22px; padding: 5px 14px;
      background: var(--card); border: 1px solid var(--border);
      font-size: 10px; color: var(--soft);
      letter-spacing: 2px; font-weight: 700; text-transform: uppercase;
    }

    .run-area { text-align: center; padding: 30px 0 24px; }

    .btn-run {
      background: var(--orange); color: #fff; border: none;
      padding: 17px 64px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 700;
      letter-spacing: 3.5px; text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 44px var(--orange-glow), 0 6px 24px rgba(0,0,0,.5);
      transition: transform .2s, box-shadow .2s, filter .2s;
      position: relative; overflow: hidden;
    }
    .btn-run::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 50%);
    }
    .btn-run:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 0 72px var(--orange-glow), 0 12px 32px rgba(0,0,0,.6);
      filter: brightness(1.08);
    }
    .btn-run:disabled { opacity: .5; cursor: not-allowed; }

    .status-row { margin-top: 16px; min-height: 32px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px;
      font-size: 10px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .badge-running { background: var(--gold-dim);   color: var(--gold);  border: 1px solid var(--gold-border); }
    .badge-done    { background: var(--green-dim);  color: var(--green); border: 1px solid var(--green-border); }
    .badge-error   { background: rgba(255,68,68,.1); color: var(--red);  border: 1px solid rgba(255,68,68,.25); }

    .spinner {
      width: 10px; height: 10px;
      border: 2px solid rgba(255,168,0,.25);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dot { width: 6px; height: 6px; background: currentColor; animation: blink 1.4s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    .log-wrap { margin: 8px 0 28px; display: none; }
    .log-wrap.show { display: block; animation: fadeUp .3s ease; }
    .log-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }
    .terminal {
      background: #000508;
      border: 1px solid rgba(0,230,118,0.12);
      padding: 18px 20px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 12px; line-height: 1.85;
      color: #00E676;
      max-height: 220px; overflow-y: auto;
    }
    .log-line { animation: fadeUp .2s ease; }
    .log-line .prompt { color: var(--orange); user-select: none; }

    .divider { display: flex; align-items: center; gap: 14px; margin: 8px 0 32px; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    }

    .rating-group { margin-bottom: 44px; animation: fadeUp .45s ease; }
    .group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .group-icon { font-size: 16px; }
    .group-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px; font-weight: 800;
      letter-spacing: 4px; text-transform: uppercase;
    }
    .group-line { flex: 1; height: 1px; background: var(--border); }
    .group-count {
      font-size: 10px; font-weight: 700;
      letter-spacing: 1px; padding: 2px 10px;
      background: var(--card); border: 1px solid var(--border);
    }

    /* Player cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left-width: 3px;
      padding: 22px 24px;
      margin-bottom: 10px;
      transition: transform .18s, box-shadow .18s;
      position: relative; overflow: hidden;
    }
    /* Subtle inner glow on left */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 60px; height: 100%;
      pointer-events: none;
    }
    .card:hover { transform: translateX(5px); }

    .card-best {
      border-left-color: var(--gold);
      border-color: var(--gold-border);
    }
    .card-best::before { background: linear-gradient(90deg, rgba(255,168,0,.05), transparent); }
    .card-best:hover { box-shadow: 4px 8px 36px rgba(255,168,0,.1); }

    .card-very {
      border-left-color: var(--purple);
      border-color: var(--purple-border);
    }
    .card-very::before { background: linear-gradient(90deg, rgba(168,126,255,.05), transparent); }
    .card-very:hover { box-shadow: 4px 8px 36px rgba(168,126,255,.1); }

    .card-fav {
      border-left-color: var(--green);
      border-color: var(--green-border);
    }
    .card-fav::before { background: linear-gradient(90deg, rgba(0,230,118,.04), transparent); }
    .card-fav:hover { box-shadow: 4px 8px 36px rgba(0,230,118,.08); }

    /* Removed the ::after top-line from original — using left border now */
    .card::after { content: none; }

    .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; gap: 12px; }

    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 30px; font-weight: 900;
      letter-spacing: -.5px; line-height: 1;
      text-transform: uppercase;
      color: #fff;
    }

    .player-sub { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
    .pos-tag {
      padding: 2px 8px;
      font-size: 9px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
    }
    .pos-best { background: var(--gold-dim);   color: var(--gold); }
    .pos-very { background: var(--purple-dim); color: var(--purple); }
    .pos-fav  { background: var(--green-dim);  color: var(--green); }

    .card-meta { font-size: 12px; color: var(--muted); }

    .rating-tag {
      flex-shrink: 0;
      padding: 5px 12px;
      font-size: 9px; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      white-space: nowrap;
    }
    .tag-best { background: var(--gold-dim);   color: var(--gold);   border: 1px solid var(--gold-border); }
    .tag-very { background: var(--purple-dim); color: var(--purple); border: 1px solid var(--purple-border); }
    .tag-fav  { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green-border); }

    .signals { border-top: 1px solid var(--border); padding-top: 14px; margin-bottom: 16px; }
    .signal {
      display: flex; align-items: flex-start; gap: 10px; padding: 5px 0;
      font-size: 13px; color: var(--soft);
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .signal:last-child { border-bottom: none; }
    .sig-arrow { color: var(--orange); font-size: 14px; line-height: 1.45; flex-shrink: 0; }

    .stats { display: flex; border-top: 1px solid var(--border); padding-top: 14px; }
    .stat { flex: 1; text-align: center; }
    .stat + .stat { border-left: 1px solid var(--border); }
    .stat-val {
      font-family: 'Fira Code', monospace;
      font-size: 22px; font-weight: 500;
    }
    .stat-lbl {
      font-size: 9px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--muted); margin-top: 4px;
    }

    .empty { text-align: center; padding: 64px 0; color: var(--muted); animation: fadeUp .4s ease; }
    .empty-icon { font-size: 40px; margin-bottom: 14px; }
    .empty p { font-size: 14px; line-height: 1.7; }

    footer {
      text-align: center; padding: 48px 0 32px;
      color: var(--muted); font-size: 10px;
      letter-spacing: 3px; text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }


    /* ═══════════════════════════════════════
       TOAST
    ═══════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid rgba(70,150,230,0.18);
      padding: 13px 26px;
      font-size: 13px; font-weight: 600; letter-spacing: .5px;
      z-index: 999; transition: transform .3s ease;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }


    /* ═══════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════ */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(70,150,230,0.18); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(70,150,230,0.32); }

  </style>
</head>
<body>

<!-- ══════════════════════════════════
     TELA DE AUTH
══════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-card">
    <span class="auth-card-corner-br"></span>

    <div class="auth-logo">
      <span class="ball">🏀</span>
      <h1><span class="nba-word">NBA</span> Tonight</h1>
      <p>Análise de Apostas Esportivas</p>
    </div>

    <div class="auth-toggle">
      <button id="btnEntrar" class="active" onclick="setMode('entrar')">Entrar</button>
      <button id="btnCriar" onclick="setMode('criar')">Criar conta</button>
    </div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="seu@email.com"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field">
      <label>Senha</label>
      <input type="password" id="authPassword" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field" id="fieldConfirm" style="display:none">
      <label>Confirmar senha</label>
      <input type="password" id="authConfirm" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>

    <button class="btn-auth" id="btnAuth" onclick="handleAuth()">Entrar</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>


<!-- ══════════════════════════════════
     SHELL DO APP
══════════════════════════════════ -->
<div id="appShell">
  <header class="app-header">
    <div class="header-brand">
      🏀 <span class="brand-nba">NBA</span> Tonight
      <span class="brand-dot"></span>
    </div>

    <nav class="header-tabs">
      <button class="tab-btn active" data-tab="analise"  onclick="switchTab('analise')">Análise</button>
      <button class="tab-btn"        data-tab="apostas"  onclick="switchTab('apostas')">Apostas</button>
      <button class="tab-btn"        data-tab="painel"   onclick="switchTab('painel')">Painel</button>
    </nav>

    <button class="btn-sair" onclick="handleSignOut()">Sair</button>
  </header>

  <main>
    <!-- Aba Análise -->
    <div id="tab-analise" class="tab-panel active">
      <div class="wrap">
        <header>
          <div class="eyebrow">Injury Spot Finder</div>
          <h1>NBA <em>Tonight</em></h1>
          <p class="tagline">Jogadores de banco ganhando minutos por lesões — ranqueados por qualidade de matchup</p>
          <div class="date-chip" id="dateChip"></div>
        </header>

        <div class="run-area">
          <button class="btn-run" id="runBtn" onclick="startAnalysis()">Rodar Análise de Hoje</button>
          <div class="status-row" id="statusRow"></div>
        </div>

        <div class="log-wrap" id="logWrap">
          <div class="log-label">Saída em Tempo Real</div>
          <div class="terminal" id="terminal"></div>
        </div>

        <div id="results"></div>
        <footer>NBA Tonight · grátis · sem assinaturas</footer>
      </div>
    </div>

    <!-- Aba Apostas -->
    <div id="tab-apostas" class="tab-panel"></div>

    <!-- Aba Painel -->
    <div id="tab-painel" class="tab-panel"></div>
  </main>
</div>

<div id="toast"></div>


<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<!-- Módulos -->
<script src="/static/firebase-config.js"></script>
<script src="/static/auth.js"></script>
<script src="/static/analise.js"></script>
<script src="/static/apostas.js"></script>
<script src="/static/painel.js"></script>

<script>
  let _mode = 'entrar';

  function setMode(mode) {
    _mode = mode;
    document.getElementById('btnEntrar').classList.toggle('active', mode === 'entrar');
    document.getElementById('btnCriar').classList.toggle('active',  mode === 'criar');
    document.getElementById('fieldConfirm').style.display = mode === 'criar' ? 'block' : 'none';
    document.getElementById('btnAuth').textContent = mode === 'entrar' ? 'Entrar' : 'Criar conta';
    document.getElementById('authError').textContent = '';
  }

  const AUTH_ERRORS = {
    'auth/invalid-email':        'Email inválido.',
    'auth/user-not-found':       'Email ou senha inválidos.',
    'auth/wrong-password':       'Email ou senha inválidos.',
    'auth/invalid-credential':   'Email ou senha inválidos.',
    'auth/email-already-in-use': 'Este email já está cadastrado.',
    'auth/weak-password':        'Senha muito fraca (mínimo 6 caracteres).',
    'auth/too-many-requests':    'Muitas tentativas. Tente novamente mais tarde.',
  };

  async function handleAuth() {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const confirm  = document.getElementById('authConfirm').value;
    const errEl    = document.getElementById('authError');
    const btn      = document.getElementById('btnAuth');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Preencha email e senha.'; return; }
    if (_mode === 'criar' && password !== confirm) { errEl.textContent = 'As senhas não coincidem.'; return; }

    btn.disabled = true;
    try {
      if (_mode === 'entrar') await signIn(email, password);
      else                    await signUp(email, password);
    } catch (e) {
      errEl.textContent = AUTH_ERRORS[e.code] || 'Erro desconhecido. Tente novamente.';
    } finally {
      btn.disabled = false;
    }
  }

  async function handleSignOut() { await signOut(); }

  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelector(`.tab-btn[data-tab="${name}"]`).classList.add('active');
    history.replaceState(null, '', '#' + name);
    if (name === 'apostas') loadApostas();
    if (name === 'painel')  loadPainel();
  }

  onAuthChange(user => {
    if (user) {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appShell').style.display   = 'flex';
      initAnalise();
      const hash = location.hash.replace('#', '');
      switchTab(['analise','apostas','painel'].includes(hash) ? hash : 'analise');
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appShell').style.display   = 'none';
    }
  });

  function showToast(msg, duration = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }
</script>
</body>
</html>
