<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCOUT · NBA Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>

    /* ══════════════════════════════════════
       TOKENS
    ══════════════════════════════════════ */
    :root {
      /* ── Fintech Premium Palette ── */
      --majorelle-blue: #623cea;
      --sand-dune:      #e7dfc6;
      --alice-blue:     #e9f1f7;
      --vintage-grape:  #54426b;
      --pearl-beige:    #dbd5b2;

      /* ── Semantic tokens ── */
      --bg:      #e9f1f7;
      --surface: #ffffff;
      --card:    #ffffff;

      /* Primary accent → majorelle-blue (backwards compat) */
      --orange:       #623cea;
      --orange-dim:   rgba(98,60,234,0.08);
      --orange-glow:  rgba(98,60,234,0.18);

      /* Tier colors (kept for analysis tab) */
      --gold:          #d97706;
      --gold-dim:      rgba(217,119,6,0.1);
      --gold-border:   rgba(217,119,6,0.28);

      --purple:        #0891b2;
      --purple-dim:    rgba(8,145,178,0.1);
      --purple-border: rgba(8,145,178,0.28);

      /* Wins → green #16a34a  |  Losses → red #dc2626 */
      --green:         #16a34a;
      --green-dim:     rgba(22,163,74,0.1);
      --green-border:  rgba(22,163,74,0.25);

      --red:    #dc2626;

      /* Text */
      --text:   #54426b;
      --muted:  rgba(84,66,107,0.45);
      --soft:   rgba(84,66,107,0.65);
      --border: #dbd5b2;

      --sidebar: 210px;
      --radius:  12px;
      --transition: 0.15s ease;

      --font-brand: 'Syne', sans-serif;
      --font-body:  'Outfit', sans-serif;
      --font-mono:  'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle noise texture on light background */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.025;
      mix-blend-mode: multiply;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }


    /* ══════════════════════════════════════
       AUTH SCREEN
    ══════════════════════════════════════ */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; position: relative; overflow: hidden;
    }

    /* Dot-grid background */
    #authScreen::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(98,60,234,0.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* Radial vignette */
    #authScreen::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 35%, var(--bg) 100%);
    }

    .auth-wm {
      position: absolute;
      font-family: var(--font-brand);
      font-weight: 900;
      font-size: clamp(140px, 22vw, 320px);
      letter-spacing: -0.04em;
      color: rgba(84,66,107,0.04);
      user-select: none; pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      white-space: nowrap;
      z-index: 0;
    }

    .auth-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      padding: 40px;
      background: #ffffff;
      border: 1px solid var(--pearl-beige);
      border-radius: 16px;
      box-shadow: 0 8px 48px rgba(84,66,107,0.1), 0 2px 8px rgba(84,66,107,0.06);
    }

    .auth-logo {
      display: flex; justify-content: center;
      margin-bottom: 28px;
    }

    .auth-logo-mark {
      width: 60px; height: 60px; border-radius: 14px;
      background: var(--majorelle-blue);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 900; font-size: 20px;
      color: #ffffff; flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .auth-toggle {
      display: flex; gap: 4px;
      background: rgba(84,66,107,0.06);
      border-radius: 8px; padding: 4px;
      margin-bottom: 22px;
    }

    .auth-toggle button {
      flex: 1; padding: 9px;
      background: transparent; border: none; border-radius: 5px;
      color: var(--muted);
      font-family: var(--font-body); font-size: 12px; font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer; transition: var(--transition);
    }

    .auth-toggle button.active {
      background: #ffffff;
      color: var(--vintage-grape);
      box-shadow: 0 1px 4px rgba(84,66,107,0.1);
    }

    .auth-field { margin-bottom: 14px; }

    .auth-field label {
      display: block; font-family: var(--font-mono);
      font-size: 9px; color: var(--muted);
      margin-bottom: 7px; letter-spacing: 0.14em; text-transform: uppercase;
    }

    .auth-field input {
      width: 100%; padding: 11px 14px;
      background: var(--alice-blue);
      border: 1px solid var(--pearl-beige);
      border-radius: 8px;
      color: var(--vintage-grape); font-family: var(--font-body); font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }

    .auth-field input::placeholder { color: var(--muted); }
    .auth-field input:focus { border-color: rgba(98,60,234,0.45); box-shadow: 0 0 0 3px rgba(98,60,234,0.08); }

    .btn-auth {
      width: 100%; margin-top: 8px; padding: 13px;
      background: var(--majorelle-blue); border: none; border-radius: 8px;
      color: #ffffff;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 16px rgba(98,60,234,0.3);
      position: relative; overflow: hidden;
    }

    .btn-auth::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
    }

    .btn-auth:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(98,60,234,0.4); }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      color: #b45309; font-size: 12px; margin-top: 12px;
      text-align: center; min-height: 18px;
      font-family: var(--font-mono); letter-spacing: 0.02em;
    }

    .auth-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 18px 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--pearl-beige);
    }
    .auth-divider span {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
    }

    .btn-google {
      width: 100%; padding: 12px;
      background: var(--alice-blue);
      border: 1px solid var(--pearl-beige);
      border-radius: 8px; color: var(--vintage-grape);
      font-family: var(--font-body); font-weight: 500; font-size: 13px;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover:not(:disabled) {
      background: #ffffff; border-color: rgba(84,66,107,0.25);
      box-shadow: 0 2px 8px rgba(84,66,107,0.08);
    }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { flex-shrink: 0; }


    /* ══════════════════════════════════════
       APP SHELL — SIDEBAR + MAIN
    ══════════════════════════════════════ */
    #appShell {
      /* JS sets display:flex when authenticated */
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────── */
    .sidebar {
      width: var(--sidebar);
      height: 100vh;
      background: var(--vintage-grape);
      border-right: none;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 10;
    }

    .sidebar-brand {
      padding: 22px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 32px; height: 32px; border-radius: 7px;
      background: var(--majorelle-blue);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 900; font-size: 12px;
      color: #ffffff; flex-shrink: 0; letter-spacing: -0.02em;
    }

    .brand-name {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 15px; letter-spacing: 0.1em; line-height: 1;
      color: #ffffff;
    }

    .brand-sub {
      font-family: var(--font-mono); font-size: 8px;
      color: rgba(255,255,255,0.45); letter-spacing: 0.12em; margin-top: 3px;
      text-transform: uppercase;
    }

    .sidebar-nav {
      flex: 1; padding: 14px 10px;
      display: flex; flex-direction: column; gap: 3px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px;
      border-radius: 8px;
      color: rgba(255,255,255,0.55);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      user-select: none; letter-spacing: 0.02em;
    }

    .nav-item:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.85); }

    .nav-item.active {
      background: var(--majorelle-blue);
      color: #ffffff;
      font-weight: 600;
      box-shadow: 0 2px 12px rgba(98,60,234,0.4);
    }

    .nav-dot {
      width: 5px; height: 5px; border-radius: 1px;
      background: currentColor; flex-shrink: 0;
      opacity: 0.6;
    }

    .nav-item.active .nav-dot { opacity: 1; }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .user-row {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 10px; overflow: hidden;
    }

    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(98,60,234,0.3);
      border: 1px solid rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 11px; color: #ffffff; flex-shrink: 0;
    }

    .user-email {
      font-size: 11px; color: rgba(255,255,255,0.45);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .btn-sair {
      width: 100%; padding: 8px;
      border: 1px solid rgba(255,255,255,0.15); background: transparent; border-radius: 7px;
      color: rgba(255,255,255,0.45);
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }

    .btn-sair:hover { border-color: rgba(255,255,255,0.35); color: rgba(255,255,255,0.8); }


    /* ── MAIN SCROLL AREA ────────────── */
    .main-scroll {
      flex: 1; height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(84,66,107,0.18) transparent;
    }

    .main-scroll::-webkit-scrollbar { width: 4px; }
    .main-scroll::-webkit-scrollbar-track { background: transparent; }
    .main-scroll::-webkit-scrollbar-thumb { background: rgba(84,66,107,0.18); border-radius: 2px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp 0.2s ease; }


    /* ══════════════════════════════════════
       ANÁLISE TAB — static content
    ══════════════════════════════════════ */
    .pg-wrap { padding: 34px 36px; }

    .pg-hdr {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
      margin-bottom: 24px; flex-wrap: wrap;
    }

    .section-title {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 22px; letter-spacing: 0.06em; line-height: 1;
      color: var(--text);
    }

    .section-sub {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); margin-top: 6px; letter-spacing: 0.07em;
    }

    /* Keep old #dateChip styled as .section-sub */
    #dateChip { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 0.07em; }

    .hdr-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── Run button ── */
    .btn-run {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px;
      background: var(--majorelle-blue); border: none; border-radius: var(--radius);
      color: #ffffff;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 13px; letter-spacing: 0.07em;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 16px rgba(98,60,234,0.3);
      position: relative; overflow: hidden;
    }

    .btn-run::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 50%);
    }

    .btn-run:hover:not(:disabled) {
      filter: brightness(1.07); transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(98,60,234,0.4);
    }

    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Status row & badges ── */
    .status-row { margin-bottom: 18px; min-height: 28px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 4px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em;
    }

    .badge-running { background: var(--gold-dim);   color: var(--gold);   border: 1px solid var(--gold-border); }
    .badge-done    { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green-border); }
    .badge-error   { background: rgba(220,38,38,0.1); color: var(--red);   border: 1px solid rgba(220,38,38,0.25); }

    .spinner {
      width: 9px; height: 9px;
      border: 2px solid rgba(245,158,11,.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    .dot {
      width: 5px; height: 5px; background: currentColor; border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ── Terminal / log ── */
    .log-wrap { display: none; margin-bottom: 26px; }
    .log-wrap.show { display: block; animation: fadeUp 0.22s ease; }

    .log-label {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em;
      color: var(--muted); margin-bottom: 8px; text-transform: uppercase;
    }

    .terminal {
      background: #f4f0f8;
      border: 1px solid var(--pearl-beige);
      border-radius: var(--radius);
      padding: 16px 18px;
      font-family: var(--font-mono); font-size: 12px; line-height: 1.85;
      color: rgba(84,66,107,0.75);
      max-height: 220px; overflow-y: auto;
    }

    .terminal::-webkit-scrollbar { width: 3px; }
    .terminal::-webkit-scrollbar-thumb { background: rgba(84,66,107,0.15); border-radius: 2px; }

    .log-line { animation: fadeUp 0.15s ease; }
    .log-line .prompt { color: var(--majorelle-blue); user-select: none; }

    /* ── Results groups ── */
    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 4px 0 26px;
    }

    .divider-line { flex: 1; height: 1px; background: var(--border); }

    .divider-label {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase;
    }

    .rating-group { margin-bottom: 32px; animation: fadeUp 0.3s ease; }

    .group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }

    .group-icon { font-size: 13px; }

    .group-label {
      font-family: var(--font-brand); font-size: 11px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
    }

    .group-line { flex: 1; height: 1px; background: var(--border); }

    .group-count {
      font-family: var(--font-mono); font-size: 10px;
      padding: 2px 10px; border-radius: 3px;
    }

    /* ── Player cards ── */
    .card {
      background: #ffffff;
      border: 1px solid var(--pearl-beige);
      border-left-width: 3px;
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 80px; height: 100%; pointer-events: none;
    }

    .card:hover { transform: translateX(4px); }
    .card::after { content: none; }

    .card-best { border-left-color: var(--gold); border-color: var(--gold-border); }
    .card-best::before { background: linear-gradient(90deg, rgba(245,158,11,.06), transparent); }
    .card-best:hover { box-shadow: 4px 0 28px rgba(245,158,11,.12); }

    .card-very { border-left-color: var(--purple); border-color: var(--purple-border); }
    .card-very::before { background: linear-gradient(90deg, rgba(0,212,180,.06), transparent); }
    .card-very:hover { box-shadow: 4px 0 28px rgba(0,212,180,.12); }

    .card-fav { border-left-color: var(--green); border-color: var(--green-border); }
    .card-fav::before { background: linear-gradient(90deg, rgba(34,197,94,.05), transparent); }
    .card-fav:hover { box-shadow: 4px 0 28px rgba(34,197,94,.1); }

    .card-head {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 12px; gap: 12px;
    }

    .player-name {
      font-family: var(--font-brand); font-size: 20px; font-weight: 800;
      letter-spacing: 0.03em; line-height: 1;
      text-transform: uppercase; color: var(--vintage-grape);
    }

    .player-sub { display: flex; align-items: center; gap: 8px; margin-top: 6px; }

    .pos-tag {
      padding: 2px 8px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .pos-best { background: var(--gold-dim);   color: var(--gold);   }
    .pos-very { background: var(--purple-dim); color: var(--purple); }
    .pos-fav  { background: var(--green-dim);  color: var(--green);  }

    .card-meta { font-size: 12px; color: var(--muted); }

    .rating-tag {
      flex-shrink: 0; padding: 4px 12px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
    }

    .tag-best { background: var(--gold-dim);   color: var(--gold);   border: 1px solid var(--gold-border); }
    .tag-very { background: var(--purple-dim); color: var(--purple); border: 1px solid var(--purple-border); }
    .tag-fav  { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green-border); }

    .signals { border-top: 1px solid var(--border); padding-top: 12px; margin-bottom: 12px; }

    .signal {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 4px 0; font-size: 13px; color: var(--soft);
      border-bottom: 1px solid rgba(255,255,255,0.025);
    }

    .signal:last-child { border-bottom: none; }
    .sig-arrow { color: var(--orange); font-size: 13px; line-height: 1.5; flex-shrink: 0; }

    .stats {
      display: flex; border-top: 1px solid var(--border); padding-top: 12px;
    }

    .stat { flex: 1; text-align: center; }
    .stat + .stat { border-left: 1px solid var(--border); }

    .stat-val {
      font-family: var(--font-mono); font-size: 17px; font-weight: 500;
      color: var(--text);
    }

    .stat-lbl {
      font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-top: 3px;
    }

    .empty {
      text-align: center; padding: 72px 0; color: var(--muted);
      animation: fadeUp 0.3s ease;
    }

    .empty-icon { font-size: 36px; margin-bottom: 14px; }
    .empty p { font-size: 14px; line-height: 1.7; color: var(--soft); }


    /* ══════════════════════════════════════
       SHARED — Apostas & Painel tabs
    ══════════════════════════════════════ */
    .btn-primary {
      padding: 9px 18px;
      background: var(--majorelle-blue); border: none; border-radius: var(--radius);
      color: #ffffff; font-family: var(--font-body);
      font-weight: 700; font-size: 13px;
      cursor: pointer; transition: var(--transition);
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(98,60,234,0.25);
    }

    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(98,60,234,0.35); }

    .btn-outline {
      padding: 9px 14px;
      background: #ffffff; border: 1px solid var(--pearl-beige); border-radius: var(--radius);
      color: var(--soft); font-family: var(--font-body);
      font-weight: 600; font-size: 13px;
      cursor: pointer; transition: var(--transition); white-space: nowrap;
    }

    .btn-outline:hover { border-color: rgba(84,66,107,0.3); color: var(--text); }

    /* Filter row */
    .filters-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }

    .f-input {
      padding: 9px 12px;
      background: #ffffff; border: 1px solid var(--pearl-beige); border-radius: var(--radius);
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }

    .f-input:focus { border-color: rgba(98,60,234,0.4); box-shadow: 0 0 0 3px rgba(98,60,234,0.08); }
    .f-input::placeholder { color: var(--muted); }
    .f-input option { background: #ffffff; color: var(--text); }

    /* Bet result badges */
    .b-badge {
      display: inline-block; padding: 2px 9px; border-radius: 4px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.04em;
    }

    .b-win  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .b-loss { background: rgba(220,38,38,0.08); color: var(--red); border: 1px solid rgba(220,38,38,0.25); }
    .b-pend { background: rgba(217,119,6,0.08); color: var(--gold); border: 1px solid rgba(217,119,6,0.22); }
    .b-void { background: rgba(84,66,107,0.04); color: var(--muted); border: 1px solid var(--pearl-beige); }

    /* Table */
    .t-wrap {
      overflow-x: auto;
      border: 1px solid var(--pearl-beige); border-radius: var(--radius);
      background: #ffffff;
    }

    .t-table { width: 100%; border-collapse: collapse; }

    .t-table th {
      padding: 11px 14px; text-align: left;
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--pearl-beige);
      white-space: nowrap;
    }

    .t-table th.r { text-align: right; }

    .t-table td {
      padding: 12px 14px; font-size: 13px; color: var(--text);
      border-bottom: 1px solid rgba(219,213,178,0.5);
    }

    .t-table tbody tr:last-child td { border-bottom: none; }
    .t-table tbody tr:hover { background: rgba(233,241,247,0.6); }

    .t-date { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
    .t-num  { font-family: var(--font-mono); font-size: 12px; }
    .t-pnl-pos  { color: var(--green); font-family: var(--font-mono); font-weight: 600; }
    .t-pnl-neg  { color: var(--red); font-family: var(--font-mono); font-weight: 600; }
    .t-pnl-zero { color: var(--muted); font-family: var(--font-mono); }

    /* Form panel (slide-in) */
    .form-overlay {
      position: fixed; inset: 0;
      background: rgba(84,66,107,0.25);
      z-index: 198; backdrop-filter: blur(4px);
    }

    .form-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 400px; max-width: 100vw;
      background: #ffffff;
      border-left: 1px solid var(--pearl-beige);
      padding: 0; overflow-y: auto; z-index: 199;
      display: flex; flex-direction: column;
      box-shadow: -8px 0 40px rgba(84,66,107,0.12);
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    .fp-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px; border-bottom: 1px solid var(--pearl-beige);
    }

    .fp-title {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 17px; letter-spacing: 0.05em;
    }

    .btn-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--pearl-beige); border-radius: 6px;
      background: transparent; color: var(--muted);
      font-size: 16px; cursor: pointer; transition: var(--transition);
    }

    .btn-close:hover { border-color: rgba(84,66,107,0.4); color: var(--vintage-grape); }

    .fp-body { flex: 1; padding: 24px; }

    .fp-label {
      display: block; font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    .fp-input {
      width: 100%; padding: 10px 12px;
      background: var(--alice-blue);
      border: 1px solid var(--pearl-beige); border-radius: 7px;
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      outline: none; margin-bottom: 16px; transition: border-color 0.15s;
    }

    .fp-input:focus { border-color: rgba(98,60,234,0.45); box-shadow: 0 0 0 3px rgba(98,60,234,0.08); }
    .fp-input option { background: #ffffff; }

    .fp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .fp-footer {
      padding: 18px 24px; border-top: 1px solid var(--pearl-beige);
      display: flex; gap: 10px;
    }

    /* ══════════════════════════════════════
       APOSTAS — Bet cards
    ══════════════════════════════════════ */
    .bet-list { display: flex; flex-direction: column; gap: 6px; }

    .bet-card {
      display: flex; overflow: hidden;
      background: #ffffff; border: 1px solid var(--pearl-beige);
      border-radius: var(--radius);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .bet-card:hover { border-color: rgba(84,66,107,0.25); box-shadow: 0 2px 12px rgba(84,66,107,0.07); }

    .bc-accent { width: 4px; flex-shrink: 0; }
    .bc-ganhou   .bc-accent { background: var(--green); }
    .bc-perdeu   .bc-accent { background: var(--red); }
    .bc-pendente .bc-accent { background: var(--gold); }
    .bc-void     .bc-accent { background: var(--pearl-beige); }

    .bc-content { flex: 1; padding: 13px 16px; min-width: 0; }

    .bc-row1 {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px; margin-bottom: 3px;
    }

    .bc-match {
      font-family: var(--font-body); font-weight: 600;
      font-size: 14px; color: var(--vintage-grape);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .bc-desc {
      font-size: 12px; color: var(--soft);
      margin-bottom: 10px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .bc-row3 {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px; flex-wrap: wrap;
    }

    .bc-chips { display: flex; gap: 5px; flex-wrap: wrap; }

    .bc-chip {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      background: var(--alice-blue); border: 1px solid var(--pearl-beige);
      padding: 2px 7px; border-radius: 4px; letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .bc-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .bc-pnl {
      font-family: var(--font-mono); font-size: 13px;
      font-weight: 600; white-space: nowrap;
    }

    .bc-edit {
      background: none; border: 1px solid var(--pearl-beige);
      color: var(--muted); border-radius: 5px; padding: 4px 9px;
      cursor: pointer; font-size: 13px; transition: all 0.15s;
      line-height: 1;
    }
    .bc-edit:hover { border-color: rgba(98,60,234,0.35); color: var(--majorelle-blue); }

    /* Delete button in form footer */
    .btn-danger {
      padding: 10px 14px; border-radius: 7px;
      background: rgba(84,66,107,0.07); border: 1px solid rgba(84,66,107,0.2);
      color: var(--vintage-grape); font-family: var(--font-body); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-danger:hover { background: rgba(84,66,107,0.13); border-color: rgba(84,66,107,0.35); }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px; margin-bottom: 26px;
    }

    .kpi-card {
      background: #ffffff; border: 1px solid var(--pearl-beige);
      border-radius: 14px; padding: 20px;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(84,66,107,0.05);
    }

    .kpi-card:hover { box-shadow: 0 4px 16px rgba(84,66,107,0.08); transform: translateY(-1px); }

    .kpi-lbl {
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }

    .kpi-val {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 24px; letter-spacing: -0.02em; line-height: 1;
    }

    /* Chart containers */
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 14px;
    }

    @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-box {
      background: #ffffff; border: 1px solid var(--pearl-beige);
      border-radius: 14px; padding: 22px;
      box-shadow: 0 2px 8px rgba(84,66,107,0.05);
    }

    .chart-box-full { grid-column: 1 / -1; }

    .chart-lbl {
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }


    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--vintage-grape);
      color: #ffffff;
      border: none;
      border-radius: 8px; padding: 12px 24px;
      font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
      z-index: 9999; transition: transform 0.3s ease;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 6px 24px rgba(84,66,107,0.3);
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(84,66,107,0.15); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(84,66,107,0.28); }


    /* ══════════════════════════════════════
       PAINEL — KPI Cards (top row)
    ══════════════════════════════════════ */
    .dash-kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 14px;
    }

    .dash-kpi {
      background: #ffffff; border: 1px solid var(--pearl-beige);
      border-radius: 14px; padding: 20px 22px;
      box-shadow: 0 2px 8px rgba(84,66,107,0.05);
    }

    .dkpi-label {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.1em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 12px;
    }

    .dkpi-main {
      display: flex; align-items: baseline; gap: 9px; margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .dkpi-val {
      font-family: var(--font-brand); font-weight: 800;
      font-size: clamp(20px, 2.4vw, 28px);
      letter-spacing: -0.02em; line-height: 1; color: var(--text);
    }

    .dkpi-pos { color: var(--green); }
    .dkpi-neg { color: var(--red); }

    .dkpi-badge {
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      padding: 2px 7px; border-radius: 4px; white-space: nowrap;
    }
    .dbadge-pos { background: rgba(22,163,74,0.1); color: var(--green); }
    .dbadge-neg { background: rgba(220,38,38,0.08); color: var(--red); }

    .dkpi-prog-wrap {
      height: 3px; background: rgba(84,66,107,0.08);
      border-radius: 2px; margin-bottom: 10px; overflow: hidden;
    }
    .dkpi-prog {
      height: 100%; border-radius: 2px;
      transition: width 1s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .dkpi-prog.kpf-lime  { background: var(--green); }
    .dkpi-prog.kpf-gold  { background: var(--gold); }
    .dkpi-prog.kpf-red   { background: var(--red); }

    .dkpi-sub {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
    }

    /* ══════════════════════════════════════
       PAINEL — Chart Cards
    ══════════════════════════════════════ */
    .dash-chart-card {
      background: #ffffff; border: 1px solid var(--pearl-beige);
      border-radius: 14px; padding: 22px 24px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(84,66,107,0.05);
    }

    .dash-chart-hdr {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 20px;
    }

    .dch-title {
      font-family: var(--font-brand); font-weight: 700;
      font-size: 15px; color: var(--text); margin-bottom: 3px;
    }

    .dch-sub {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.04em;
    }

    .dch-range-btns { display: flex; gap: 4px; flex-shrink: 0; }

    .dch-range-btn {
      background: none; border: 1px solid var(--pearl-beige);
      color: var(--muted); font-family: var(--font-mono); font-size: 10px;
      padding: 4px 9px; border-radius: 4px; cursor: pointer;
      letter-spacing: 0.06em; transition: all 0.15s;
    }
    .dch-range-btn:hover { color: var(--text); border-color: rgba(84,66,107,0.3); }
    .dch-range-btn.active {
      background: rgba(98,60,234,0.1); border-color: var(--majorelle-blue); color: var(--majorelle-blue);
    }

    .dch-total-badge {
      font-family: var(--font-mono); font-size: 13px;
      color: var(--majorelle-blue); font-weight: 500;
    }

    /* ══════════════════════════════════════
       PAINEL — Bottom 2-col layout
    ══════════════════════════════════════ */
    .dash-bottom {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 14px;
    }
    .dash-bottom .dash-chart-card { margin-bottom: 0; }

    /* ══════════════════════════════════════
       PAINEL — Results by Type bars
    ══════════════════════════════════════ */
    .dtype-row { margin-bottom: 18px; }
    .dtype-row:last-child { margin-bottom: 0; }

    .dtype-info {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }

    .dtype-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 8px; flex-shrink: 0;
    }

    .dtype-name {
      font-family: var(--font-body); font-size: 13px;
      color: var(--text); display: flex; align-items: center;
    }

    .dtype-val {
      font-family: var(--font-mono); font-size: 12px; font-weight: 500;
    }
    .dtype-val.dkpi-pos { color: #16a34a; }
    .dtype-val.dkpi-neg { color: var(--red); }

    .dtype-bar-wrap {
      height: 5px; background: rgba(84,66,107,0.07);
      border-radius: 3px; overflow: hidden;
    }
    .dtype-bar {
      height: 100%; border-radius: 3px;
      transition: width 0.9s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .dtype-bar-pos { background: var(--green); }
    .dtype-bar-neg { background: var(--red); }

    /* kept for backward compat */
    .kpf-lime  { background: var(--green); }
    .kpf-green { background: var(--green); }
    .kpf-red   { background: var(--red); }
    .kpf-gold  { background: var(--gold); }
    .kv-lime  { color: var(--green); }
    .kv-green { color: var(--green); }
    .kv-red   { color: var(--red); }
    .kv-gold  { color: var(--gold); }
    .kv-teal  { color: var(--purple); }
    .kv-text  { color: var(--text); }
    .chart-full { margin-bottom: 14px; }

  </style>
</head>
<body>

<!-- ══════════════════════════════════
     TELA DE AUTH
══════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-wm" aria-hidden="true">SCOUT</div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">SC</div>
    </div>

    <div class="auth-toggle">
      <button id="btnEntrar" class="active" onclick="setMode('entrar')">Entrar</button>
      <button id="btnCriar" onclick="setMode('criar')">Criar conta</button>
    </div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="seu@email.com"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field">
      <label>Senha</label>
      <input type="password" id="authPassword" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field" id="fieldConfirm" style="display:none">
      <label>Confirmar senha</label>
      <input type="password" id="authConfirm" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>

    <button class="btn-auth" id="btnAuth" onclick="handleAuth()">Entrar</button>
    <div class="auth-error" id="authError"></div>

    <div class="auth-divider"><span>ou</span></div>

    <button class="btn-google" id="btnGoogle" onclick="handleGoogleAuth()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuar com Google
    </button>
  </div>
</div>


<!-- ══════════════════════════════════
     APP SHELL
══════════════════════════════════ -->
<div id="appShell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">SC</div>
      <div>
        <div class="brand-name">SCOUT</div>
        <div class="brand-sub">NBA Analysis</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item active" data-tab="analise" onclick="switchTab('analise')">
        <span class="nav-dot"></span>
        <span>Análise</span>
      </div>
      <div class="nav-item" data-tab="apostas" onclick="switchTab('apostas')">
        <span class="nav-dot"></span>
        <span>Apostas</span>
      </div>
      <div class="nav-item" data-tab="painel" onclick="switchTab('painel')">
        <span class="nav-dot"></span>
        <span>Painel</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-email" id="userEmailDisplay">...</span>
      </div>
      <button class="btn-sair" onclick="handleSignOut()">Sair →</button>
    </div>
  </aside>

  <!-- Main scroll area -->
  <div class="main-scroll">

    <!-- Aba Análise -->
    <div id="tab-analise" class="tab-panel active">
      <div class="pg-wrap">
        <div class="pg-hdr">
          <div>
            <h1 class="section-title">ANÁLISE DO DIA</h1>
            <div id="dateChip"></div>
          </div>
          <button class="btn-run" id="runBtn" onclick="startAnalysis()">▶ Rodar Análise</button>
        </div>

        <div class="status-row" id="statusRow"></div>

        <div class="log-wrap" id="logWrap">
          <div class="log-label">Saída em tempo real</div>
          <div class="terminal" id="terminal"></div>
        </div>

        <div id="results"></div>
      </div>
    </div>

    <!-- Aba Apostas (preenchida pelo JS) -->
    <div id="tab-apostas" class="tab-panel"></div>

    <!-- Aba Painel (preenchida pelo JS) -->
    <div id="tab-painel" class="tab-panel"></div>

  </div><!-- /main-scroll -->
</div><!-- /appShell -->

<div id="toast"></div>

<script src="/static/auth.js"></script>
<script src="/static/analise.js"></script>
<script src="/static/apostas.js"></script>
<script src="/static/painel.js"></script>

<script>
  let _mode = 'entrar';

  function setMode(mode) {
    _mode = mode;
    document.getElementById('btnEntrar').classList.toggle('active', mode === 'entrar');
    document.getElementById('btnCriar').classList.toggle('active',  mode === 'criar');
    document.getElementById('fieldConfirm').style.display = mode === 'criar' ? 'block' : 'none';
    document.getElementById('btnAuth').textContent = mode === 'entrar' ? 'Entrar' : 'Criar conta';
    document.getElementById('authError').textContent = '';
  }

  const AUTH_ERRORS = {
    'auth/invalid-email':           'Email inválido.',
    'auth/user-not-found':          'Email ou senha inválidos.',
    'auth/wrong-password':          'Email ou senha inválidos.',
    'auth/invalid-credential':      'Email ou senha inválidos.',
    'auth/email-already-in-use':    'Este email já está cadastrado.',
    'auth/weak-password':           'Senha muito fraca (mínimo 6 caracteres).',
    'auth/too-many-requests':       'Muitas tentativas. Tente novamente mais tarde.',
    'auth/operation-not-allowed':   'Login com Google não habilitado no Firebase Console.',
    'auth/unauthorized-domain':     'Domínio não autorizado no Firebase Console. Adicione em Authentication → Settings → Authorized domains.',
    'auth/popup-blocked':           'Popup bloqueado pelo navegador. Tente novamente.',
    'auth/network-request-failed':  'Falha de rede. Verifique sua conexão.',
    'auth/internal-error':          'Erro interno do Firebase. Verifique a configuração do projeto.',
  };

  // Exibe erro de redirect Google (popup bloqueado → redirect)
  if (window._googleRedirectError) {
    const errEl = document.getElementById('authError');
    if (errEl) errEl.textContent = AUTH_ERRORS[window._googleRedirectError.code]
      || `Erro Google: ${window._googleRedirectError.code}`;
    window._googleRedirectError = null;
  }

  async function handleAuth() {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const confirm  = document.getElementById('authConfirm').value;
    const errEl    = document.getElementById('authError');
    const btn      = document.getElementById('btnAuth');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Preencha email e senha.'; return; }
    if (_mode === 'criar' && password !== confirm) { errEl.textContent = 'As senhas não coincidem.'; return; }

    btn.disabled = true;
    try {
      if (_mode === 'entrar') await signIn(email, password);
      else                    await signUp(email, password);
    } catch (e) {
      errEl.textContent = AUTH_ERRORS[e.code] || 'Erro desconhecido. Tente novamente.';
    } finally {
      btn.disabled = false;
    }
  }

  async function handleSignOut() { await signOut(); }

  async function handleGoogleAuth() {
    const errEl = document.getElementById('authError');
    const btn   = document.getElementById('btnGoogle');
    errEl.textContent = '';
    btn.disabled = true;
    try {
      await signInWithGoogle();
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        errEl.textContent = AUTH_ERRORS[e.code] || `Erro ao entrar com Google (${e.code || e.message}).`;
      }
    } finally {
      btn.disabled = false;
    }
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    const navEl = document.querySelector(`.nav-item[data-tab="${name}"]`);
    if (navEl) navEl.classList.add('active');
    history.replaceState(null, '', '#' + name);
    if (name === 'apostas') loadApostas();
    if (name === 'painel')  loadPainel();
  }

  onAuthChange(user => {
    if (user) {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appShell').style.display   = 'flex';
      const email = user.email || '';
      document.getElementById('userEmailDisplay').textContent = email;
      document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase() || '?';
      initAnalise();
      const hash = location.hash.replace('#', '');
      switchTab(['analise','apostas','painel'].includes(hash) ? hash : 'analise');
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appShell').style.display   = 'none';
    }
  });

  function showToast(msg, duration = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }
</script>
</body>
</html>
