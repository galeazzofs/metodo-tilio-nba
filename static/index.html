<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCOUT · NBA Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>

    /* ══════════════════════════════════════
       TOKENS
    ══════════════════════════════════════ */
    :root {
      --bg:      #06080f;
      --surface: #0c1020;
      --card:    rgba(255,255,255,0.028);

      /* Primary: electric lime (replaces --orange for backwards compat) */
      --orange:       #c6f135;
      --orange-dim:   rgba(198,241,53,0.1);
      --orange-glow:  rgba(198,241,53,0.2);

      /* Tier colors */
      --gold:          #f59e0b;
      --gold-dim:      rgba(245,158,11,0.1);
      --gold-border:   rgba(245,158,11,0.25);

      --purple:        #00d4b4;   /* repurposed: teal for VERY FAVORABLE */
      --purple-dim:    rgba(0,212,180,0.1);
      --purple-border: rgba(0,212,180,0.25);

      --green:         #22c55e;
      --green-dim:     rgba(34,197,94,0.1);
      --green-border:  rgba(34,197,94,0.25);

      --red:    #f43f5e;
      --text:   #dde8f5;
      --muted:  rgba(221,232,245,0.3);
      --soft:   rgba(221,232,245,0.6);
      --border: rgba(255,255,255,0.07);

      --sidebar: 210px;
      --radius:  9px;
      --transition: 0.15s ease;

      --font-brand: 'Syne', sans-serif;
      --font-body:  'Outfit', sans-serif;
      --font-mono:  'IBM Plex Mono', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.018;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes shimmer { from{transform:translateX(-100%)} to{transform:translateX(100%)} }


    /* ══════════════════════════════════════
       AUTH SCREEN
    ══════════════════════════════════════ */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; position: relative; overflow: hidden;
    }

    /* Grid background */
    #authScreen::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(198,241,53,0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(198,241,53,0.045) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* Radial vignette */
    #authScreen::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 75% 75% at 50% 50%, transparent 30%, var(--bg) 100%);
    }

    .auth-wm {
      position: absolute;
      font-family: var(--font-brand);
      font-weight: 900;
      font-size: clamp(90px, 16vw, 220px);
      letter-spacing: -0.04em;
      color: rgba(198,241,53,0.038);
      user-select: none; pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      white-space: nowrap;
      z-index: 0;
    }

    .auth-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      padding: 40px;
      background: rgba(12,16,32,0.94);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 14px;
      backdrop-filter: blur(24px);
      box-shadow: 0 28px 80px rgba(0,0,0,0.55);
    }

    .auth-logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 30px;
    }

    .auth-logo-mark {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 900; font-size: 16px;
      color: #06080f; flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .auth-logo-name {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 22px; letter-spacing: 0.08em; line-height: 1;
      color: var(--text);
    }

    .auth-logo-sub {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--muted); letter-spacing: 0.1em; margin-top: 3px;
      text-transform: uppercase;
    }

    .auth-toggle {
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.35);
      border-radius: 8px; padding: 4px;
      margin-bottom: 22px;
    }

    .auth-toggle button {
      flex: 1; padding: 9px;
      background: transparent; border: none; border-radius: 5px;
      color: var(--muted);
      font-family: var(--font-body); font-size: 12px; font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer; transition: var(--transition);
    }

    .auth-toggle button.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .auth-field { margin-bottom: 14px; }

    .auth-field label {
      display: block; font-family: var(--font-mono);
      font-size: 9px; color: var(--muted);
      margin-bottom: 7px; letter-spacing: 0.14em; text-transform: uppercase;
    }

    .auth-field input {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      color: var(--text); font-family: var(--font-body); font-size: 14px;
      outline: none; transition: border-color 0.15s;
    }

    .auth-field input::placeholder { color: var(--muted); }
    .auth-field input:focus { border-color: rgba(198,241,53,0.4); }

    .btn-auth {
      width: 100%; margin-top: 8px; padding: 13px;
      background: var(--orange); border: none; border-radius: 8px;
      color: #06080f;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 0 28px var(--orange-glow);
      position: relative; overflow: hidden;
    }

    .btn-auth::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2.5s ease-in-out infinite;
    }

    .btn-auth:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      color: var(--red); font-size: 12px; margin-top: 12px;
      text-align: center; min-height: 18px;
      font-family: var(--font-mono); letter-spacing: 0.02em;
    }


    /* ══════════════════════════════════════
       APP SHELL — SIDEBAR + MAIN
    ══════════════════════════════════════ */
    #appShell {
      /* JS sets display:flex when authenticated */
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────── */
    .sidebar {
      width: var(--sidebar);
      height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 10;
    }

    .sidebar-brand {
      padding: 22px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 32px; height: 32px; border-radius: 7px;
      background: var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 900; font-size: 12px;
      color: #06080f; flex-shrink: 0; letter-spacing: -0.02em;
    }

    .brand-name {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 15px; letter-spacing: 0.1em; line-height: 1;
      color: var(--text);
    }

    .brand-sub {
      font-family: var(--font-mono); font-size: 8px;
      color: var(--muted); letter-spacing: 0.12em; margin-top: 3px;
      text-transform: uppercase;
    }

    .sidebar-nav {
      flex: 1; padding: 14px 10px;
      display: flex; flex-direction: column; gap: 3px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 10px;
      border-radius: 7px;
      color: var(--muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      user-select: none; letter-spacing: 0.02em;
    }

    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--soft); }

    .nav-item.active {
      background: var(--orange-dim);
      color: var(--orange);
      font-weight: 600;
    }

    .nav-dot {
      width: 5px; height: 5px; border-radius: 1px;
      background: currentColor; flex-shrink: 0;
      opacity: 0.6;
    }

    .nav-item.active .nav-dot { opacity: 1; }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .user-row {
      display: flex; align-items: center; gap: 9px;
      margin-bottom: 10px; overflow: hidden;
    }

    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--orange-dim);
      border: 1px solid rgba(198,241,53,0.25);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 11px; color: var(--orange); flex-shrink: 0;
    }

    .user-email {
      font-size: 11px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .btn-sair {
      width: 100%; padding: 8px;
      border: 1px solid var(--border); background: transparent; border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }

    .btn-sair:hover { border-color: rgba(244,63,94,0.35); color: var(--red); }


    /* ── MAIN SCROLL AREA ────────────── */
    .main-scroll {
      flex: 1; height: 100vh;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }

    .main-scroll::-webkit-scrollbar { width: 4px; }
    .main-scroll::-webkit-scrollbar-track { background: transparent; }
    .main-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeUp 0.2s ease; }


    /* ══════════════════════════════════════
       ANÁLISE TAB — static content
    ══════════════════════════════════════ */
    .pg-wrap { padding: 34px 36px; }

    .pg-hdr {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
      margin-bottom: 24px; flex-wrap: wrap;
    }

    .section-title {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 22px; letter-spacing: 0.06em; line-height: 1;
      color: var(--text);
    }

    .section-sub {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); margin-top: 6px; letter-spacing: 0.07em;
    }

    /* Keep old #dateChip styled as .section-sub */
    #dateChip { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 0.07em; }

    .hdr-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    /* ── Run button ── */
    .btn-run {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px;
      background: var(--orange); border: none; border-radius: var(--radius);
      color: #06080f;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 13px; letter-spacing: 0.07em;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 0 32px var(--orange-glow);
      position: relative; overflow: hidden;
    }

    .btn-run::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent 50%);
    }

    .btn-run:hover:not(:disabled) {
      filter: brightness(1.07); transform: translateY(-1px);
      box-shadow: 0 0 48px var(--orange-glow);
    }

    .btn-run:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Status row & badges ── */
    .status-row { margin-bottom: 18px; min-height: 28px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 4px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em;
    }

    .badge-running { background: var(--gold-dim);   color: var(--gold);   border: 1px solid var(--gold-border); }
    .badge-done    { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green-border); }
    .badge-error   { background: rgba(244,63,94,.1); color: var(--red);   border: 1px solid rgba(244,63,94,.25); }

    .spinner {
      width: 9px; height: 9px;
      border: 2px solid rgba(245,158,11,.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }

    .dot {
      width: 5px; height: 5px; background: currentColor; border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ── Terminal / log ── */
    .log-wrap { display: none; margin-bottom: 26px; }
    .log-wrap.show { display: block; animation: fadeUp 0.22s ease; }

    .log-label {
      font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em;
      color: var(--muted); margin-bottom: 8px; text-transform: uppercase;
    }

    .terminal {
      background: #020407;
      border: 1px solid rgba(198,241,53,0.07);
      border-radius: var(--radius);
      padding: 16px 18px;
      font-family: var(--font-mono); font-size: 12px; line-height: 1.85;
      color: #8aac9a;
      max-height: 220px; overflow-y: auto;
    }

    .terminal::-webkit-scrollbar { width: 3px; }
    .terminal::-webkit-scrollbar-thumb { background: rgba(198,241,53,0.15); border-radius: 2px; }

    .log-line { animation: fadeUp 0.15s ease; }
    .log-line .prompt { color: var(--orange); user-select: none; }

    /* ── Results groups ── */
    .divider {
      display: flex; align-items: center; gap: 14px;
      margin: 4px 0 26px;
    }

    .divider-line { flex: 1; height: 1px; background: var(--border); }

    .divider-label {
      font-family: var(--font-mono); font-size: 9px;
      letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase;
    }

    .rating-group { margin-bottom: 32px; animation: fadeUp 0.3s ease; }

    .group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }

    .group-icon { font-size: 13px; }

    .group-label {
      font-family: var(--font-brand); font-size: 11px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
    }

    .group-line { flex: 1; height: 1px; background: var(--border); }

    .group-count {
      font-family: var(--font-mono); font-size: 10px;
      padding: 2px 10px; border-radius: 3px;
    }

    /* ── Player cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 10px;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative; overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 80px; height: 100%; pointer-events: none;
    }

    .card:hover { transform: translateX(4px); }
    .card::after { content: none; }

    .card-best { border-left-color: var(--gold); border-color: var(--gold-border); }
    .card-best::before { background: linear-gradient(90deg, rgba(245,158,11,.06), transparent); }
    .card-best:hover { box-shadow: 4px 0 28px rgba(245,158,11,.12); }

    .card-very { border-left-color: var(--purple); border-color: var(--purple-border); }
    .card-very::before { background: linear-gradient(90deg, rgba(0,212,180,.06), transparent); }
    .card-very:hover { box-shadow: 4px 0 28px rgba(0,212,180,.12); }

    .card-fav { border-left-color: var(--green); border-color: var(--green-border); }
    .card-fav::before { background: linear-gradient(90deg, rgba(34,197,94,.05), transparent); }
    .card-fav:hover { box-shadow: 4px 0 28px rgba(34,197,94,.1); }

    .card-head {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 12px; gap: 12px;
    }

    .player-name {
      font-family: var(--font-brand); font-size: 20px; font-weight: 800;
      letter-spacing: 0.03em; line-height: 1;
      text-transform: uppercase; color: #fff;
    }

    .player-sub { display: flex; align-items: center; gap: 8px; margin-top: 6px; }

    .pos-tag {
      padding: 2px 8px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
    }

    .pos-best { background: var(--gold-dim);   color: var(--gold);   }
    .pos-very { background: var(--purple-dim); color: var(--purple); }
    .pos-fav  { background: var(--green-dim);  color: var(--green);  }

    .card-meta { font-size: 12px; color: var(--muted); }

    .rating-tag {
      flex-shrink: 0; padding: 4px 12px; border-radius: 3px;
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
    }

    .tag-best { background: var(--gold-dim);   color: var(--gold);   border: 1px solid var(--gold-border); }
    .tag-very { background: var(--purple-dim); color: var(--purple); border: 1px solid var(--purple-border); }
    .tag-fav  { background: var(--green-dim);  color: var(--green);  border: 1px solid var(--green-border); }

    .signals { border-top: 1px solid var(--border); padding-top: 12px; margin-bottom: 12px; }

    .signal {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 4px 0; font-size: 13px; color: var(--soft);
      border-bottom: 1px solid rgba(255,255,255,0.025);
    }

    .signal:last-child { border-bottom: none; }
    .sig-arrow { color: var(--orange); font-size: 13px; line-height: 1.5; flex-shrink: 0; }

    .stats {
      display: flex; border-top: 1px solid var(--border); padding-top: 12px;
    }

    .stat { flex: 1; text-align: center; }
    .stat + .stat { border-left: 1px solid var(--border); }

    .stat-val {
      font-family: var(--font-mono); font-size: 17px; font-weight: 500;
      color: var(--text);
    }

    .stat-lbl {
      font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-top: 3px;
    }

    .empty {
      text-align: center; padding: 72px 0; color: var(--muted);
      animation: fadeUp 0.3s ease;
    }

    .empty-icon { font-size: 36px; margin-bottom: 14px; }
    .empty p { font-size: 14px; line-height: 1.7; color: var(--soft); }


    /* ══════════════════════════════════════
       SHARED — Apostas & Painel tabs
    ══════════════════════════════════════ */
    .btn-primary {
      padding: 9px 18px;
      background: var(--orange); border: none; border-radius: var(--radius);
      color: #06080f; font-family: var(--font-body);
      font-weight: 700; font-size: 13px;
      cursor: pointer; transition: var(--transition);
      white-space: nowrap;
    }

    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }

    .btn-outline {
      padding: 9px 14px;
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--soft); font-family: var(--font-body);
      font-weight: 600; font-size: 13px;
      cursor: pointer; transition: var(--transition); white-space: nowrap;
    }

    .btn-outline:hover { border-color: rgba(255,255,255,0.14); color: var(--text); }

    /* Filter row */
    .filters-row { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }

    .f-input {
      padding: 9px 12px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }

    .f-input:focus { border-color: rgba(198,241,53,0.3); }
    .f-input::placeholder { color: var(--muted); }
    .f-input option { background: var(--surface); color: var(--text); }

    /* Bet result badges */
    .b-badge {
      display: inline-block; padding: 2px 9px; border-radius: 4px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.04em;
    }

    .b-win  { background: rgba(34,197,94,.1);  color: #22c55e; border: 1px solid rgba(34,197,94,.25); }
    .b-loss { background: rgba(244,63,94,.1);   color: var(--red); border: 1px solid rgba(244,63,94,.25); }
    .b-pend { background: rgba(245,158,11,.1);  color: var(--gold); border: 1px solid rgba(245,158,11,.25); }
    .b-void { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

    /* Table */
    .t-wrap {
      overflow-x: auto;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card);
    }

    .t-table { width: 100%; border-collapse: collapse; }

    .t-table th {
      padding: 11px 14px; text-align: left;
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .t-table th.r { text-align: right; }

    .t-table td {
      padding: 12px 14px; font-size: 13px; color: var(--text);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .t-table tbody tr:last-child td { border-bottom: none; }
    .t-table tbody tr:hover { background: rgba(255,255,255,0.025); }

    .t-date { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
    .t-num  { font-family: var(--font-mono); font-size: 12px; }
    .t-pnl-pos  { color: #22c55e; font-family: var(--font-mono); font-weight: 600; }
    .t-pnl-neg  { color: var(--red); font-family: var(--font-mono); font-weight: 600; }
    .t-pnl-zero { color: var(--muted); font-family: var(--font-mono); }

    /* Form panel (slide-in) */
    .form-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 198; backdrop-filter: blur(4px);
    }

    .form-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 400px; max-width: 100vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 0; overflow-y: auto; z-index: 199;
      display: flex; flex-direction: column;
      box-shadow: -20px 0 60px rgba(0,0,0,0.4);
      animation: slideIn 0.22s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }

    .fp-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 24px; border-bottom: 1px solid var(--border);
    }

    .fp-title {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 17px; letter-spacing: 0.05em;
    }

    .btn-close {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 6px;
      background: transparent; color: var(--muted);
      font-size: 16px; cursor: pointer; transition: var(--transition);
    }

    .btn-close:hover { border-color: rgba(244,63,94,.35); color: var(--red); }

    .fp-body { flex: 1; padding: 24px; }

    .fp-label {
      display: block; font-family: var(--font-mono);
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 7px;
    }

    .fp-input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      outline: none; margin-bottom: 16px; transition: border-color 0.15s;
    }

    .fp-input:focus { border-color: rgba(198,241,53,0.3); }
    .fp-input option { background: var(--surface); }

    .fp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .fp-footer {
      padding: 18px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 14px; margin-bottom: 26px;
    }

    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: var(--transition);
    }

    .kpi-card:hover { background: rgba(255,255,255,0.04); }

    .kpi-lbl {
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.13em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }

    .kpi-val {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 24px; letter-spacing: -0.02em; line-height: 1;
    }

    /* Chart containers */
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 14px;
    }

    @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }

    .chart-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px;
    }

    .chart-box-full { grid-column: 1 / -1; }

    .chart-lbl {
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }


    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 12px 24px;
      font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
      z-index: 9999; transition: transform 0.3s ease;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 10px 40px rgba(0,0,0,0.55);
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.14); }

  </style>
</head>
<body>

<!-- ══════════════════════════════════
     TELA DE AUTH
══════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-wm" aria-hidden="true">SCOUT</div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">SC</div>
      <div>
        <div class="auth-logo-name">SCOUT</div>
        <div class="auth-logo-sub">NBA Intelligence Platform</div>
      </div>
    </div>

    <div class="auth-toggle">
      <button id="btnEntrar" class="active" onclick="setMode('entrar')">Entrar</button>
      <button id="btnCriar" onclick="setMode('criar')">Criar conta</button>
    </div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="seu@email.com"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field">
      <label>Senha</label>
      <input type="password" id="authPassword" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field" id="fieldConfirm" style="display:none">
      <label>Confirmar senha</label>
      <input type="password" id="authConfirm" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>

    <button class="btn-auth" id="btnAuth" onclick="handleAuth()">Entrar</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>


<!-- ══════════════════════════════════
     APP SHELL
══════════════════════════════════ -->
<div id="appShell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-mark">SC</div>
      <div>
        <div class="brand-name">SCOUT</div>
        <div class="brand-sub">NBA Analysis</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-item active" data-tab="analise" onclick="switchTab('analise')">
        <span class="nav-dot"></span>
        <span>Análise</span>
      </div>
      <div class="nav-item" data-tab="apostas" onclick="switchTab('apostas')">
        <span class="nav-dot"></span>
        <span>Apostas</span>
      </div>
      <div class="nav-item" data-tab="painel" onclick="switchTab('painel')">
        <span class="nav-dot"></span>
        <span>Painel</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="user-row">
        <div class="user-avatar" id="userAvatar">?</div>
        <span class="user-email" id="userEmailDisplay">...</span>
      </div>
      <button class="btn-sair" onclick="handleSignOut()">Sair →</button>
    </div>
  </aside>

  <!-- Main scroll area -->
  <div class="main-scroll">

    <!-- Aba Análise -->
    <div id="tab-analise" class="tab-panel active">
      <div class="pg-wrap">
        <div class="pg-hdr">
          <div>
            <h1 class="section-title">ANÁLISE DO DIA</h1>
            <div id="dateChip"></div>
          </div>
          <button class="btn-run" id="runBtn" onclick="startAnalysis()">▶ Rodar Análise</button>
        </div>

        <div class="status-row" id="statusRow"></div>

        <div class="log-wrap" id="logWrap">
          <div class="log-label">Saída em tempo real</div>
          <div class="terminal" id="terminal"></div>
        </div>

        <div id="results"></div>
      </div>
    </div>

    <!-- Aba Apostas (preenchida pelo JS) -->
    <div id="tab-apostas" class="tab-panel"></div>

    <!-- Aba Painel (preenchida pelo JS) -->
    <div id="tab-painel" class="tab-panel"></div>

  </div><!-- /main-scroll -->
</div><!-- /appShell -->

<div id="toast"></div>


<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<!-- Módulos -->
<script src="/static/firebase-config.js"></script>
<script src="/static/auth.js"></script>
<script src="/static/analise.js"></script>
<script src="/static/apostas.js"></script>
<script src="/static/painel.js"></script>

<script>
  let _mode = 'entrar';

  function setMode(mode) {
    _mode = mode;
    document.getElementById('btnEntrar').classList.toggle('active', mode === 'entrar');
    document.getElementById('btnCriar').classList.toggle('active',  mode === 'criar');
    document.getElementById('fieldConfirm').style.display = mode === 'criar' ? 'block' : 'none';
    document.getElementById('btnAuth').textContent = mode === 'entrar' ? 'Entrar' : 'Criar conta';
    document.getElementById('authError').textContent = '';
  }

  const AUTH_ERRORS = {
    'auth/invalid-email':        'Email inválido.',
    'auth/user-not-found':       'Email ou senha inválidos.',
    'auth/wrong-password':       'Email ou senha inválidos.',
    'auth/invalid-credential':   'Email ou senha inválidos.',
    'auth/email-already-in-use': 'Este email já está cadastrado.',
    'auth/weak-password':        'Senha muito fraca (mínimo 6 caracteres).',
    'auth/too-many-requests':    'Muitas tentativas. Tente novamente mais tarde.',
  };

  async function handleAuth() {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const confirm  = document.getElementById('authConfirm').value;
    const errEl    = document.getElementById('authError');
    const btn      = document.getElementById('btnAuth');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Preencha email e senha.'; return; }
    if (_mode === 'criar' && password !== confirm) { errEl.textContent = 'As senhas não coincidem.'; return; }

    btn.disabled = true;
    try {
      if (_mode === 'entrar') await signIn(email, password);
      else                    await signUp(email, password);
    } catch (e) {
      errEl.textContent = AUTH_ERRORS[e.code] || 'Erro desconhecido. Tente novamente.';
    } finally {
      btn.disabled = false;
    }
  }

  async function handleSignOut() { await signOut(); }

  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    const navEl = document.querySelector(`.nav-item[data-tab="${name}"]`);
    if (navEl) navEl.classList.add('active');
    history.replaceState(null, '', '#' + name);
    if (name === 'apostas') loadApostas();
    if (name === 'painel')  loadPainel();
  }

  onAuthChange(user => {
    if (user) {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appShell').style.display   = 'flex';
      const email = user.email || '';
      document.getElementById('userEmailDisplay').textContent = email;
      document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase() || '?';
      initAnalise();
      const hash = location.hash.replace('#', '');
      switchTab(['analise','apostas','painel'].includes(hash) ? hash : 'analise');
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appShell').style.display   = 'none';
    }
  });

  function showToast(msg, duration = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }
</script>
</body>
</html>
