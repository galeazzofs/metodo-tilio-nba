<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SCOUT · NBA Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

    /* ══════════════════════════════════════
       MIDNIGHT COURT — Design Tokens
    ══════════════════════════════════════ */
    :root {
      /* ── Core Palette ── */
      --bg:         #08080d;
      --bg-raised:  #0e0e15;
      --surface:    #14141e;
      --card:       #1a1a26;
      --card-hover: #1f1f2e;

      /* ── Primary: Amber Court Light ── */
      --amber:       #f59e0b;
      --amber-dim:   rgba(245,158,11,0.1);
      --amber-glow:  rgba(245,158,11,0.2);
      --amber-strong: #fbbf24;

      /* ── Secondary: Cyan Ice ── */
      --cyan:        #06b6d4;
      --cyan-dim:    rgba(6,182,212,0.1);

      /* ── Backwards-compat aliases (JS references) ── */
      --orange:       #f59e0b;
      --orange-dim:   rgba(245,158,11,0.1);
      --orange-glow:  rgba(245,158,11,0.2);
      --majorelle-blue: #f59e0b;

      /* ── Tier colors ── */
      --gold:          #fbbf24;
      --gold-dim:      rgba(251,191,36,0.1);
      --gold-border:   rgba(251,191,36,0.25);

      --purple:        #06b6d4;
      --purple-dim:    rgba(6,182,212,0.1);
      --purple-border: rgba(6,182,212,0.25);

      /* ── Semantic: wins/losses ── */
      --green:         #22c55e;
      --green-dim:     rgba(34,197,94,0.1);
      --green-border:  rgba(34,197,94,0.25);

      --red:           #ef4444;
      --red-dim:       rgba(239,68,68,0.1);
      --red-border:    rgba(239,68,68,0.25);

      /* ── Text ── */
      --text:    #e4e4e7;
      --soft:    rgba(228,228,231,0.7);
      --muted:   rgba(228,228,231,0.35);
      --border:  rgba(228,228,231,0.08);

      /* ── Layout ── */
      --sidebar:    220px;
      --radius:     12px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);

      /* ── Fonts ── */
      --font-brand:   'Unbounded', sans-serif;
      --font-body:    'Outfit', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
      --font-poppins: 'Outfit', sans-serif;

      /* ── Compat aliases ── */
      --vintage-grape: #e4e4e7;
      --pearl-beige:   rgba(228,228,231,0.08);
      --alice-blue:    #14141e;
      --sand-dune:     rgba(228,228,231,0.08);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Subtle dot-grid pattern */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(245,158,11,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Ambient glow orbs */
    body::after {
      content: '';
      position: fixed; pointer-events: none; z-index: 0;
      width: 600px; height: 600px;
      top: -200px; right: -100px;
      background: radial-gradient(circle, rgba(245,158,11,0.06) 0%, transparent 70%);
      filter: blur(80px);
    }

    /* ── Keyframes ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes shimmer {
      from { transform: translateX(-100%); }
      to   { transform: translateX(100%); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(245,158,11,0.15); }
      50%      { box-shadow: 0 0 40px rgba(245,158,11,0.3); }
    }
    @keyframes borderRotate {
      0%   { --angle: 0deg; }
      100% { --angle: 360deg; }
    }
    @keyframes slideInRight {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes typewriter {
      from { width: 0; }
      to   { width: 100%; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }


    /* ══════════════════════════════════════
       AUTH SCREEN
    ══════════════════════════════════════ */
    #authScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; position: relative; overflow: hidden;
      background: var(--bg);
    }

    /* Animated court lines background */
    #authScreen::before {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background:
        linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black 30%, transparent 70%);
    }

    /* Ambient glow behind card */
    #authScreen::after {
      content: '';
      position: absolute; pointer-events: none;
      width: 400px; height: 400px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      filter: blur(60px);
    }

    .auth-wm {
      position: absolute;
      font-family: var(--font-brand);
      font-weight: 900;
      font-size: clamp(120px, 20vw, 280px);
      letter-spacing: -0.03em;
      color: rgba(228,228,231,0.02);
      user-select: none; pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -52%);
      white-space: nowrap;
      z-index: 0;
    }

    .auth-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 44px;
      background: rgba(20,20,30,0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(245,158,11,0.12);
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(245,158,11,0.06),
        0 24px 80px rgba(0,0,0,0.6),
        0 4px 16px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.04);
      animation: fadeUp 0.6s ease;
    }

    .auth-logo {
      display: flex; justify-content: center;
      margin-bottom: 32px;
    }

    .auth-logo-mark {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 900; font-size: 20px;
      color: #08080d; flex-shrink: 0;
      letter-spacing: -0.02em;
      box-shadow: 0 8px 32px rgba(245,158,11,0.3), 0 0 0 1px rgba(245,158,11,0.2);
    }

    .auth-toggle {
      display: flex; gap: 4px;
      background: rgba(228,228,231,0.04);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      margin-bottom: 24px;
    }

    .auth-toggle button {
      flex: 1; padding: 10px;
      background: transparent; border: none; border-radius: 7px;
      color: var(--muted);
      font-family: var(--font-body); font-size: 13px; font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer; transition: var(--transition);
    }

    .auth-toggle button.active {
      background: rgba(245,158,11,0.1);
      color: var(--amber);
      box-shadow: 0 2px 8px rgba(245,158,11,0.1);
    }

    .auth-field { margin-bottom: 16px; }

    .auth-field label {
      display: block; font-family: var(--font-mono);
      font-size: 10px; color: var(--muted);
      margin-bottom: 8px; letter-spacing: 0.12em; text-transform: uppercase;
    }

    .auth-field input {
      width: 100%; padding: 12px 16px;
      background: rgba(228,228,231,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text); font-family: var(--font-body); font-size: 14px;
      outline: none; transition: all 0.2s;
    }

    .auth-field input::placeholder { color: var(--muted); }
    .auth-field input:focus {
      border-color: rgba(245,158,11,0.4);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.08), 0 0 20px rgba(245,158,11,0.05);
      background: rgba(228,228,231,0.06);
    }

    .btn-auth {
      width: 100%; margin-top: 10px; padding: 14px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none; border-radius: 10px;
      color: #08080d;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 14px; letter-spacing: 0.06em; text-transform: uppercase;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 24px rgba(245,158,11,0.3);
      position: relative; overflow: hidden;
    }

    .btn-auth::after {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }

    .btn-auth:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,158,11,0.4), 0 0 60px rgba(245,158,11,0.15);
    }
    .btn-auth:active:not(:disabled) { transform: translateY(0); }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      color: var(--amber); font-size: 12px; margin-top: 12px;
      text-align: center; min-height: 18px;
      font-family: var(--font-mono); letter-spacing: 0.02em;
    }

    .auth-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .auth-divider span {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
    }

    .btn-google {
      width: 100%; padding: 13px;
      background: rgba(228,228,231,0.04);
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--soft);
      font-family: var(--font-body); font-weight: 500; font-size: 13px;
      cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-google:hover:not(:disabled) {
      background: rgba(228,228,231,0.08);
      border-color: rgba(228,228,231,0.15);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-google svg { flex-shrink: 0; }


    /* ══════════════════════════════════════
       APP SHELL — SIDEBAR + MAIN
    ══════════════════════════════════════ */
    #appShell {
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ─────────────────────── */
    .sidebar {
      width: var(--sidebar);
      height: 100vh;
      background: var(--bg-raised);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 10;
      position: relative;
    }

    /* Subtle gradient edge on sidebar */
    .sidebar::after {
      content: '';
      position: absolute; top: 0; right: -1px; bottom: 0;
      width: 80px; pointer-events: none;
      background: linear-gradient(90deg, transparent, rgba(245,158,11,0.02));
    }

    .sidebar-brand {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 900; font-size: 12px;
      color: #08080d; flex-shrink: 0; letter-spacing: -0.02em;
      box-shadow: 0 4px 16px rgba(245,158,11,0.25);
    }

    .brand-name {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 16px; letter-spacing: 0.08em; line-height: 1;
      color: var(--text);
    }

    .brand-sub {
      font-family: var(--font-mono); font-size: 9px;
      color: var(--muted); letter-spacing: 0.1em; margin-top: 4px;
      text-transform: uppercase;
    }

    .sidebar-nav {
      flex: 1; padding: 16px 12px;
      display: flex; flex-direction: column; gap: 4px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 12px;
      border-radius: 10px;
      color: var(--muted);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
      user-select: none; letter-spacing: 0.02em;
      position: relative;
    }

    .nav-item:hover {
      background: rgba(228,228,231,0.04);
      color: var(--soft);
    }

    .nav-item.active {
      background: rgba(245,158,11,0.1);
      color: var(--amber);
      font-weight: 600;
      box-shadow: 0 2px 12px rgba(245,158,11,0.1);
    }

    .nav-item.active::before {
      content: '';
      position: absolute; left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 20px;
      background: var(--amber);
      border-radius: 0 2px 2px 0;
    }

    .nav-dot {
      width: 6px; height: 6px; border-radius: 2px;
      background: currentColor; flex-shrink: 0;
      opacity: 0.5;
    }

    .nav-item.active .nav-dot { opacity: 1; border-radius: 50%; }

    .sidebar-footer {
      padding: 18px;
      border-top: 1px solid var(--border);
    }

    .user-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; overflow: hidden;
    }

    .user-avatar {
      width: 30px; height: 30px; border-radius: 8px;
      background: rgba(245,158,11,0.15);
      border: 1px solid rgba(245,158,11,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 12px; color: var(--amber); flex-shrink: 0;
    }

    .user-email {
      font-size: 11px; color: var(--muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .btn-sair {
      width: 100%; padding: 9px;
      border: 1px solid var(--border); background: transparent; border-radius: 8px;
      color: var(--muted);
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: var(--transition);
    }

    .btn-sair:hover {
      border-color: rgba(239,68,68,0.3); color: var(--red);
      background: rgba(239,68,68,0.05);
    }


    /* ── MAIN SCROLL AREA ────────────── */
    .main-scroll {
      flex: 1; height: 100vh;
      overflow-y: auto;
      background: var(--bg);
      scrollbar-width: thin;
      scrollbar-color: rgba(245,158,11,0.15) transparent;
    }

    .main-scroll::-webkit-scrollbar { width: 5px; }
    .main-scroll::-webkit-scrollbar-track { background: transparent; }
    .main-scroll::-webkit-scrollbar-thumb {
      background: rgba(245,158,11,0.15);
      border-radius: 3px;
    }
    .main-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(245,158,11,0.3);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; animation: fadeIn 0.3s ease; }


    /* ══════════════════════════════════════
       ANÁLISE TAB
    ══════════════════════════════════════ */
    .pg-wrap { padding: 36px 40px; }

    .pg-hdr {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 16px;
      margin-bottom: 28px; flex-wrap: wrap;
    }

    .section-title {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 24px; letter-spacing: 0.04em; line-height: 1;
      color: var(--text);
      background: linear-gradient(135deg, var(--text), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-sub {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); margin-top: 8px; letter-spacing: 0.06em;
    }

    #dateChip {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); margin-top: 8px; letter-spacing: 0.06em;
    }

    .hdr-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    /* ── Run button ── */
    .btn-run {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none; border-radius: var(--radius);
      color: #08080d;
      font-family: var(--font-brand); font-weight: 800;
      font-size: 13px; letter-spacing: 0.05em;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 20px rgba(245,158,11,0.3);
      position: relative; overflow: hidden;
    }

    .btn-run::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 50%);
    }

    .btn-run:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(245,158,11,0.4), 0 0 60px rgba(245,158,11,0.12);
    }

    .btn-run:active:not(:disabled) { transform: translateY(0); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Status row & badges ── */
    .status-row { margin-bottom: 20px; min-height: 28px; }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px; border-radius: 8px;
      font-family: var(--font-mono); font-size: 11px; font-weight: 500;
      letter-spacing: 0.05em;
      backdrop-filter: blur(8px);
    }

    .badge-running {
      background: rgba(251,191,36,0.08);
      color: var(--gold);
      border: 1px solid rgba(251,191,36,0.2);
      animation: pulseGlow 2s ease-in-out infinite;
    }
    .badge-done {
      background: rgba(34,197,94,0.08);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.2);
    }
    .badge-error {
      background: rgba(239,68,68,0.08);
      color: var(--red);
      border: 1px solid rgba(239,68,68,0.2);
    }

    .spinner {
      width: 10px; height: 10px;
      border: 2px solid rgba(251,191,36,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    .dot {
      width: 6px; height: 6px; background: currentColor; border-radius: 50%;
      animation: blink 1.4s ease-in-out infinite;
    }

    /* ── Terminal / log ── */
    .log-wrap { display: none; margin-bottom: 28px; }
    .log-wrap.show { display: block; animation: fadeUp 0.25s ease; }

    .log-label {
      font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em;
      color: var(--muted); margin-bottom: 10px; text-transform: uppercase;
    }

    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      font-family: var(--font-mono); font-size: 12px; line-height: 1.9;
      color: var(--soft);
      max-height: 240px; overflow-y: auto;
      position: relative;
    }

    /* Terminal glow edge */
    .terminal::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,158,11,0.2), transparent);
    }

    .terminal::-webkit-scrollbar { width: 3px; }
    .terminal::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.15); border-radius: 2px; }

    .log-line { animation: fadeUp 0.12s ease; }
    .log-line .prompt { color: var(--amber); user-select: none; }

    /* ── Results groups ── */
    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 4px 0 28px;
    }

    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    .divider-label {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase;
    }

    .rating-group { margin-bottom: 36px; animation: fadeUp 0.35s ease; }

    .group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }

    .group-icon { font-size: 14px; }

    .group-label {
      font-family: var(--font-brand); font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
    }

    .group-line {
      flex: 1; height: 1px;
      background: var(--border);
    }

    .group-count {
      font-family: var(--font-mono); font-size: 10px;
      padding: 3px 10px; border-radius: 6px;
    }

    /* ── Player cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 10px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative; overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 0;
      width: 100px; height: 100%; pointer-events: none;
    }

    .card:hover {
      transform: translateX(6px);
      background: var(--card-hover);
      border-color: rgba(228,228,231,0.12);
    }

    .card::after { content: none; }

    .card-best {
      border-left-color: var(--gold);
      border-color: rgba(251,191,36,0.15);
    }
    .card-best::before {
      background: linear-gradient(90deg, rgba(251,191,36,0.06), transparent);
    }
    .card-best:hover {
      box-shadow: 6px 0 32px rgba(251,191,36,0.1), 0 0 60px rgba(251,191,36,0.04);
    }

    .card-very {
      border-left-color: var(--cyan);
      border-color: rgba(6,182,212,0.15);
    }
    .card-very::before {
      background: linear-gradient(90deg, rgba(6,182,212,0.06), transparent);
    }
    .card-very:hover {
      box-shadow: 6px 0 32px rgba(6,182,212,0.1), 0 0 60px rgba(6,182,212,0.04);
    }

    .card-fav {
      border-left-color: var(--green);
      border-color: rgba(34,197,94,0.15);
    }
    .card-fav::before {
      background: linear-gradient(90deg, rgba(34,197,94,0.06), transparent);
    }
    .card-fav:hover {
      box-shadow: 6px 0 32px rgba(34,197,94,0.1), 0 0 60px rgba(34,197,94,0.04);
    }

    .card-head {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 14px; gap: 12px;
    }

    .player-name {
      font-family: var(--font-brand); font-size: 20px; font-weight: 800;
      letter-spacing: 0.02em; line-height: 1;
      text-transform: uppercase; color: var(--text);
    }

    .player-sub { display: flex; align-items: center; gap: 8px; margin-top: 8px; }

    .pos-tag {
      padding: 3px 10px; border-radius: 6px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .pos-best { background: var(--gold-dim);   color: var(--gold); }
    .pos-very { background: var(--purple-dim); color: var(--cyan); }
    .pos-fav  { background: var(--green-dim);  color: var(--green); }

    .card-meta { font-size: 12px; color: var(--muted); }

    .card-head-right {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 6px; flex-shrink: 0;
    }

    .rating-tag {
      flex-shrink: 0; padding: 4px 14px; border-radius: 6px;
      font-family: var(--font-mono); font-size: 9px; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap;
    }

    .line-label {
      font-family: var(--font-mono); font-size: 11px; color: var(--muted);
      white-space: nowrap;
    }
    .line-value { color: var(--soft); font-weight: 600; }
    .line-na    { color: var(--muted); }

    .tag-best {
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid var(--gold-border);
      box-shadow: 0 0 12px rgba(251,191,36,0.1);
    }
    .tag-very {
      background: var(--purple-dim);
      color: var(--cyan);
      border: 1px solid var(--purple-border);
      box-shadow: 0 0 12px rgba(6,182,212,0.1);
    }
    .tag-fav {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid var(--green-border);
      box-shadow: 0 0 12px rgba(34,197,94,0.1);
    }

    .signals {
      border-top: 1px solid var(--border);
      padding-top: 14px; margin-bottom: 14px;
    }

    .signal {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 5px 0; font-size: 13px; color: var(--soft);
    }

    .signal:last-child { border-bottom: none; }
    .sig-arrow { color: var(--amber); font-size: 14px; line-height: 1.5; flex-shrink: 0; }

    .stats {
      display: flex; border-top: 1px solid var(--border); padding-top: 14px;
    }

    .stat { flex: 1; text-align: center; }
    .stat + .stat { border-left: 1px solid var(--border); }

    .stat-val {
      font-family: var(--font-mono); font-size: 18px; font-weight: 600;
      color: var(--text);
    }

    .stat-lbl {
      font-size: 9px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted); margin-top: 4px;
    }

    .empty {
      text-align: center; padding: 80px 0; color: var(--muted);
      animation: fadeUp 0.3s ease;
    }

    .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
    .empty p { font-size: 14px; line-height: 1.7; color: var(--soft); }


    /* ══════════════════════════════════════
       SHARED — Apostas & Painel tabs
    ══════════════════════════════════════ */
    .btn-primary {
      padding: 10px 20px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      border: none; border-radius: var(--radius);
      color: #08080d; font-family: var(--font-body);
      font-weight: 700; font-size: 13px;
      cursor: pointer; transition: var(--transition);
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(245,158,11,0.25);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(245,158,11,0.35);
    }

    .btn-outline {
      padding: 10px 16px;
      background: rgba(228,228,231,0.04);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--soft); font-family: var(--font-body);
      font-weight: 600; font-size: 13px;
      cursor: pointer; transition: var(--transition); white-space: nowrap;
    }

    .btn-outline:hover {
      border-color: rgba(228,228,231,0.15);
      color: var(--text);
      background: rgba(228,228,231,0.06);
    }

    /* Filter row */
    .filters-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }

    .f-input {
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      outline: none; transition: all 0.2s;
    }

    .f-input:focus {
      border-color: rgba(245,158,11,0.3);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.06);
    }
    .f-input::placeholder { color: var(--muted); }
    .f-input option { background: var(--surface); color: var(--text); }

    /* Bet result badges */
    .b-badge {
      display: inline-block; padding: 3px 10px; border-radius: 6px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 600;
      letter-spacing: 0.04em;
    }

    .b-win  { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); }
    .b-loss { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-border); }
    .b-pend { background: var(--gold-dim);  color: var(--gold);  border: 1px solid var(--gold-border); }
    .b-void { background: rgba(228,228,231,0.04); color: var(--muted); border: 1px solid var(--border); }

    /* Table */
    .t-wrap {
      overflow-x: auto;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card);
    }

    .t-table { width: 100%; border-collapse: collapse; }

    .t-table th {
      padding: 12px 16px; text-align: left;
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .t-table th.r { text-align: right; }

    .t-table td {
      padding: 13px 16px; font-size: 13px; color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .t-table tbody tr:last-child td { border-bottom: none; }
    .t-table tbody tr:hover { background: rgba(228,228,231,0.03); }

    .t-date { font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
    .t-num  { font-family: var(--font-mono); font-size: 12px; }
    .t-pnl-pos  { color: var(--green); font-family: var(--font-mono); font-weight: 600; }
    .t-pnl-neg  { color: var(--red);   font-family: var(--font-mono); font-weight: 600; }
    .t-pnl-zero { color: var(--muted); font-family: var(--font-mono); }

    /* Form panel (slide-in) */
    .form-overlay {
      position: fixed; inset: 0;
      background: rgba(8,8,13,0.6);
      z-index: 198; backdrop-filter: blur(8px);
    }

    .form-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 420px; max-width: 100vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 0; overflow-y: auto; z-index: 199;
      display: flex; flex-direction: column;
      box-shadow: -12px 0 60px rgba(0,0,0,0.5);
      animation: slideInRight 0.25s ease;
    }

    .fp-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 26px; border-bottom: 1px solid var(--border);
    }

    .fp-title {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 16px; letter-spacing: 0.04em;
    }

    .btn-close {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 8px;
      background: transparent; color: var(--muted);
      font-size: 16px; cursor: pointer; transition: var(--transition);
    }

    .btn-close:hover {
      border-color: rgba(239,68,68,0.3); color: var(--red);
      background: rgba(239,68,68,0.05);
    }

    .fp-body { flex: 1; padding: 26px; }

    .fp-label {
      display: block; font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }

    .fp-input {
      width: 100%; padding: 11px 14px;
      background: rgba(228,228,231,0.04);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font-body); font-size: 13px;
      outline: none; margin-bottom: 18px; transition: all 0.2s;
    }

    .fp-input:focus {
      border-color: rgba(245,158,11,0.35);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.06);
    }
    .fp-input option { background: var(--surface); color: var(--text); }

    .fp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .fp-footer {
      padding: 20px 26px; border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }


    /* ══════════════════════════════════════
       APOSTAS — Bet cards
    ══════════════════════════════════════ */
    .bet-list { display: flex; flex-direction: column; gap: 8px; }

    .bet-card {
      display: flex; overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.2s;
    }
    .bet-card:hover {
      border-color: rgba(228,228,231,0.12);
      background: var(--card-hover);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .bc-accent { width: 4px; flex-shrink: 0; }
    .bc-ganhou   .bc-accent { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.3); }
    .bc-perdeu   .bc-accent { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.3); }
    .bc-pendente .bc-accent { background: var(--gold); box-shadow: 0 0 8px rgba(251,191,36,0.3); }
    .bc-void     .bc-accent { background: rgba(228,228,231,0.15); }

    .bc-content { flex: 1; padding: 14px 18px; min-width: 0; }

    .bc-row1 {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 12px; margin-bottom: 4px;
    }

    .bc-match {
      font-family: var(--font-body); font-weight: 600;
      font-size: 14px; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .bc-desc {
      font-size: 12px; color: var(--muted);
      margin-bottom: 12px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .bc-row3 {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px; flex-wrap: wrap;
    }

    .bc-chips { display: flex; gap: 6px; flex-wrap: wrap; }

    .bc-chip {
      font-family: var(--font-mono); font-size: 10px; color: var(--muted);
      background: rgba(228,228,231,0.04);
      border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 6px; letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .bc-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .bc-pnl {
      font-family: var(--font-mono); font-size: 13px;
      font-weight: 600; white-space: nowrap;
    }

    .bc-edit {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px; padding: 5px 10px;
      cursor: pointer; font-size: 13px; transition: all 0.15s;
      line-height: 1;
    }
    .bc-edit:hover {
      border-color: rgba(245,158,11,0.35);
      color: var(--amber);
      background: rgba(245,158,11,0.05);
    }

    /* Delete button in form footer */
    .btn-danger {
      padding: 10px 16px; border-radius: 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: var(--red); font-family: var(--font-body); font-size: 12px;
      font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-danger:hover {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.35);
    }

    /* KPI cards (legacy) */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px; margin-bottom: 28px;
    }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 22px;
      transition: var(--transition);
    }

    .kpi-card:hover {
      border-color: rgba(228,228,231,0.12);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .kpi-lbl {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }

    .kpi-val {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 24px; letter-spacing: -0.02em; line-height: 1;
    }

    /* Chart containers */
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 14px;
    }

    .chart-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 24px;
    }

    .chart-box-full { grid-column: 1 / -1; }

    .chart-lbl {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 18px;
    }


    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card);
      color: var(--text);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: 10px; padding: 13px 26px;
      font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
      z-index: 9999; transition: transform 0.3s ease;
      pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(245,158,11,0.08);
      backdrop-filter: blur(16px);
    }

    #toast.show { transform: translateX(-50%) translateY(0); }


    /* ══════════════════════════════════════
       Global scrollbar
    ══════════════════════════════════════ */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,0.25); }


    /* ══════════════════════════════════════
       PAINEL — KPI Cards (top row)
    ══════════════════════════════════════ */
    .dash-kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px; margin-bottom: 16px;
    }

    .dash-kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 22px 24px;
      transition: all 0.25s;
      position: relative; overflow: hidden;
    }

    /* Subtle corner glow on KPI cards */
    .dash-kpi::before {
      content: '';
      position: absolute; top: -30px; right: -30px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(245,158,11,0.04);
      filter: blur(20px);
      transition: all 0.3s;
    }

    .dash-kpi:hover {
      border-color: rgba(245,158,11,0.15);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    .dash-kpi:hover::before {
      background: rgba(245,158,11,0.08);
    }

    .dkpi-label {
      font-family: var(--font-mono); font-size: 10px; font-weight: 500;
      letter-spacing: 0.08em; color: var(--muted);
      text-transform: uppercase; margin-bottom: 14px;
    }

    .dkpi-main {
      display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .dkpi-val {
      font-family: var(--font-brand); font-weight: 800;
      font-size: clamp(20px, 2.4vw, 28px);
      letter-spacing: -0.02em; line-height: 1; color: var(--text);
    }

    .dkpi-pos { color: var(--green); text-shadow: 0 0 20px rgba(34,197,94,0.2); }
    .dkpi-neg { color: var(--red); text-shadow: 0 0 20px rgba(239,68,68,0.2); }

    .dkpi-badge {
      font-family: var(--font-mono); font-size: 11px; font-weight: 600;
      padding: 3px 8px; border-radius: 6px; white-space: nowrap;
    }
    .dbadge-pos { background: rgba(34,197,94,0.1); color: var(--green); }
    .dbadge-neg { background: rgba(239,68,68,0.08); color: var(--red); }

    .dkpi-prog-wrap {
      height: 3px; background: rgba(228,228,231,0.06);
      border-radius: 2px; margin-bottom: 12px; overflow: hidden;
    }
    .dkpi-prog {
      height: 100%; border-radius: 2px;
      transition: width 1.2s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .dkpi-prog.kpf-lime  { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,0.3); }
    .dkpi-prog.kpf-gold  { background: var(--gold); box-shadow: 0 0 8px rgba(251,191,36,0.3); }
    .dkpi-prog.kpf-red   { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.3); }

    .dkpi-sub {
      font-family: var(--font-body); font-size: 11px; font-weight: 400;
      color: var(--muted);
    }


    /* ══════════════════════════════════════
       PAINEL — Chart Cards
    ══════════════════════════════════════ */
    .dash-chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 26px;
      margin-bottom: 14px;
      position: relative; overflow: hidden;
    }

    /* Top edge glow */
    .dash-chart-card::before {
      content: '';
      position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,158,11,0.15), transparent);
    }

    .dash-chart-hdr {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 22px;
    }

    .dch-title {
      font-family: var(--font-brand); font-weight: 700;
      font-size: 15px; color: var(--text); margin-bottom: 4px;
    }

    .dch-sub {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.04em;
    }

    .dch-range-btns { display: flex; gap: 4px; flex-shrink: 0; }

    .dch-range-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font-mono); font-size: 10px;
      padding: 5px 10px; border-radius: 6px; cursor: pointer;
      letter-spacing: 0.05em; transition: all 0.15s;
    }
    .dch-range-btn:hover {
      color: var(--soft); border-color: rgba(228,228,231,0.15);
    }
    .dch-range-btn.active {
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.3);
      color: var(--amber);
    }

    .dch-total-badge {
      font-family: var(--font-mono); font-size: 13px;
      color: var(--amber); font-weight: 600;
    }

    /* ══════════════════════════════════════
       PAINEL — Bottom 2-col layout
    ══════════════════════════════════════ */
    .dash-bottom {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 14px; margin-bottom: 14px;
    }
    .dash-bottom .dash-chart-card { margin-bottom: 0; }

    /* ══════════════════════════════════════
       PAINEL — Results by Type bars
    ══════════════════════════════════════ */
    .dtype-row { margin-bottom: 20px; }
    .dtype-row:last-child { margin-bottom: 0; }

    .dtype-info {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }

    .dtype-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 8px; flex-shrink: 0;
    }

    .dtype-name {
      font-family: var(--font-body); font-size: 13px;
      color: var(--text); display: flex; align-items: center;
    }

    .dtype-val {
      font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    }
    .dtype-val.dkpi-pos { color: var(--green); }
    .dtype-val.dkpi-neg { color: var(--red); }

    .dtype-bar-wrap {
      height: 5px; background: rgba(228,228,231,0.05);
      border-radius: 3px; overflow: hidden;
    }
    .dtype-bar {
      height: 100%; border-radius: 3px;
      transition: width 1s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .dtype-bar-pos { background: var(--green); }
    .dtype-bar-neg { background: var(--red); }

    /* Compat aliases */
    .kpf-lime  { background: var(--green); }
    .kpf-green { background: var(--green); }
    .kpf-red   { background: var(--red); }
    .kpf-gold  { background: var(--gold); }
    .kv-lime  { color: var(--green); }
    .kv-green { color: var(--green); }
    .kv-red   { color: var(--red); }
    .kv-gold  { color: var(--gold); }
    .kv-teal  { color: var(--cyan); }
    .kv-text  { color: var(--text); }
    .chart-full { margin-bottom: 14px; }


    /* ─── Card entrance animation ──────────────────────────── */
    .anim-enter {
      animation: fadeUp 0.4s ease both;
      animation-delay: calc(var(--i, 0) * 70ms);
    }
    @media (prefers-reduced-motion: reduce) {
      .anim-enter { animation: none; }
    }


    /* ─── Histórico de Análises ──────────────────────────── */
    .hist-section {
      margin-top: 52px;
      border-top: 1px solid var(--border);
      padding-top: 36px;
    }

    .hist-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 22px;
    }

    .hist-title {
      font-family: var(--font-brand); font-weight: 800;
      font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text);
    }

    .hist-count {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.06em;
    }

    .hist-entry {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .hist-entry:hover { border-color: rgba(228,228,231,0.12); }

    .hist-entry-head {
      display: flex; align-items: center; gap: 14px;
      padding: 15px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    .hist-entry-head:hover { background: rgba(228,228,231,0.02); }

    .hist-entry-head.open { border-bottom: 1px solid var(--border); }

    .hist-date {
      font-family: var(--font-mono); font-size: 12px;
      font-weight: 600; color: var(--text); white-space: nowrap;
    }

    .hist-games {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--muted); letter-spacing: 0.04em; white-space: nowrap;
    }

    .hist-candidates {
      display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
    }

    .hist-cand-chip {
      font-family: var(--font-mono); font-size: 10px;
      padding: 3px 9px; border-radius: 6px;
      white-space: nowrap; letter-spacing: 0.04em;
    }

    .hist-chip-best { background: var(--gold-dim);   color: var(--gold);  border: 1px solid var(--gold-border); }
    .hist-chip-very { background: var(--purple-dim); color: var(--cyan);  border: 1px solid var(--purple-border); }
    .hist-chip-fav  { background: var(--green-dim);  color: var(--green); border: 1px solid var(--green-border); }

    .hist-trigger-badge {
      font-family: var(--font-mono); font-size: 9px;
      padding: 3px 8px; border-radius: 6px; letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .hist-badge-auto   { background: rgba(245,158,11,0.08); color: var(--amber); }
    .hist-badge-manual { background: rgba(228,228,231,0.04); color: var(--muted); }

    .hist-chevron {
      font-size: 11px; color: var(--muted); flex-shrink: 0;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hist-chevron.open { transform: rotate(180deg); }

    .hist-body {
      display: none;
      padding: 18px 20px;
      animation: fadeUp 0.2s ease;
    }

    .hist-body.open { display: block; }

    /* Cards dentro do histórico: mais compactos */
    .hist-body .card {
      margin-bottom: 8px;
      padding: 14px 16px;
    }

    .hist-body .player-name { font-size: 16px; }
    .hist-body .stat-val    { font-size: 14px; }

    .hist-empty {
      padding: 36px; text-align: center;
      font-family: var(--font-mono); font-size: 11px;
      color: var(--muted); letter-spacing: 0.06em;
    }


    /* ─── Mobile bottom nav ────────────────────────────────── */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 68px;
      background: var(--bg-raised);
      border-top: 1px solid var(--border);
      z-index: 200;
      align-items: center;
      justify-content: space-around;
      padding: 0 8px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      backdrop-filter: blur(16px);
    }

    .bn-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 3px;
      background: none; border: none; cursor: pointer;
      color: var(--muted);
      font-family: var(--font-body); font-size: 11px; font-weight: 500;
      padding: 8px 16px; border-radius: 12px;
      transition: all var(--transition);
      flex: 1;
    }
    .bn-item svg { width: 20px; height: 20px; }
    .bn-item.active { color: var(--amber); }
    .bn-item.active svg { stroke: var(--amber); }


    /* ─── Mobile breakpoint ≤ 960px ────────────────────────── */
    @media (max-width: 960px) {
      .sidebar          { display: none; }
      #appShell         { flex-direction: column; }
      .bottom-nav       { display: flex; }
      .main-scroll      { padding-bottom: calc(84px + env(safe-area-inset-bottom, 0px)); }
      .pg-wrap          { padding: 18px; }
      .kpi-grid         { grid-template-columns: 1fr 1fr; }
      .dash-kpi-row     { grid-template-columns: 1fr 1fr; }
      .charts-grid      { grid-template-columns: 1fr; }
      .dash-bottom      { grid-template-columns: 1fr; }

      .section-title { font-size: 20px; }
    }

  </style>
</head>
<body>

<!-- ══════════════════════════════════
     TELA DE AUTH
══════════════════════════════════ -->
<div id="authScreen">
  <div class="auth-wm" aria-hidden="true">SCOUT</div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">SC</div>
    </div>

    <div class="auth-toggle">
      <button id="btnEntrar" class="active" onclick="setMode('entrar')">Entrar</button>
      <button id="btnCriar" onclick="setMode('criar')">Criar conta</button>
    </div>

    <div class="auth-field">
      <label>Email</label>
      <input type="email" id="authEmail" placeholder="seu@email.com"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field">
      <label>Senha</label>
      <input type="password" id="authPassword" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>
    <div class="auth-field" id="fieldConfirm" style="display:none">
      <label>Confirmar senha</label>
      <input type="password" id="authConfirm" placeholder="••••••••"
             onkeydown="if(event.key==='Enter')handleAuth()" />
    </div>

    <button class="btn-auth" id="btnAuth" onclick="handleAuth()">Entrar</button>
    <div class="auth-error" id="authError"></div>

    <div class="auth-divider"><span>ou</span></div>

    <button class="btn-google" id="btnGoogle" onclick="handleGoogleAuth()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continuar com Google
    </button>
  </div>
</div>

          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<!-- Módulos -->
<script src="/static/firebase-config.js"></script>
<script src="/static/auth.js"></script>
<script src="/static/analise.js"></script>
<script src="/static/apostas.js"></script>
<script src="/static/painel.js"></script>

<script>
  let _mode = 'entrar';

  function setMode(mode) {
    _mode = mode;
    document.getElementById('btnEntrar').classList.toggle('active', mode === 'entrar');
    document.getElementById('btnCriar').classList.toggle('active',  mode === 'criar');
    document.getElementById('fieldConfirm').style.display = mode === 'criar' ? 'block' : 'none';
    document.getElementById('btnAuth').textContent = mode === 'entrar' ? 'Entrar' : 'Criar conta';
    document.getElementById('authError').textContent = '';
  }

  const AUTH_ERRORS = {
    'auth/invalid-email':           'Email inválido.',
    'auth/user-not-found':          'Email ou senha inválidos.',
    'auth/wrong-password':          'Email ou senha inválidos.',
    'auth/invalid-credential':      'Email ou senha inválidos.',
    'auth/email-already-in-use':    'Este email já está cadastrado.',
    'auth/weak-password':           'Senha muito fraca (mínimo 6 caracteres).',
    'auth/too-many-requests':       'Muitas tentativas. Tente novamente mais tarde.',
    'auth/operation-not-allowed':   'Login com Google não habilitado no Firebase Console.',
    'auth/unauthorized-domain':     'Domínio não autorizado no Firebase Console. Adicione em Authentication → Settings → Authorized domains.',
    'auth/popup-blocked':           'Popup bloqueado pelo navegador. Tente novamente.',
    'auth/network-request-failed':  'Falha de rede. Verifique sua conexão.',
    'auth/internal-error':          'Erro interno do Firebase. Verifique a configuração do projeto.',
  };

  // Exibe erro de redirect Google (popup bloqueado → redirect)
  if (window._googleRedirectError) {
    const errEl = document.getElementById('authError');
    if (errEl) errEl.textContent = AUTH_ERRORS[window._googleRedirectError.code]
      || `Erro Google: ${window._googleRedirectError.code}`;
    window._googleRedirectError = null;
  }

  async function handleAuth() {
    const email    = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    const confirm  = document.getElementById('authConfirm').value;
    const errEl    = document.getElementById('authError');
    const btn      = document.getElementById('btnAuth');

    errEl.textContent = '';
    if (!email || !password) { errEl.textContent = 'Preencha email e senha.'; return; }
    if (_mode === 'criar' && password !== confirm) { errEl.textContent = 'As senhas não coincidem.'; return; }

    btn.disabled = true;
    try {
      if (_mode === 'entrar') await signIn(email, password);
      else                    await signUp(email, password);
    } catch (e) {
      errEl.textContent = AUTH_ERRORS[e.code] || 'Erro desconhecido. Tente novamente.';
    } finally {
      btn.disabled = false;
    }
  }

  async function handleSignOut() { await signOut(); }

  async function handleGoogleAuth() {
    const errEl = document.getElementById('authError');
    const btn   = document.getElementById('btnGoogle');
    errEl.textContent = '';
    btn.disabled = true;
    try {
      await signInWithGoogle();
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        errEl.textContent = AUTH_ERRORS[e.code] || `Erro ao entrar com Google (${e.code || e.message}).`;
      }
    } finally {
      btn.disabled = false;
    }
  }

  function animateTab(tabId) {
    const SELECTORS = {
      painel:  '.dash-kpi, .dash-chart-card, .chart-box',
      apostas: '.bet-card',
      analise: '.card',
    };
    const sel = SELECTORS[tabId];
    if (!sel) return;
    const panel = document.getElementById('tab-' + tabId);
    if (!panel) return;
    panel.querySelectorAll('.anim-enter').forEach(el => el.classList.remove('anim-enter'));
    requestAnimationFrame(() => {
      const els = [...panel.querySelectorAll(sel)].slice(0, 8);
      els.forEach((el, i) => {
        el.style.setProperty('--i', i);
        el.classList.add('anim-enter');
      });
    });
  }

  function switchTab(name) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    const navEl = document.querySelector(`.nav-item[data-tab="${name}"]`);
    if (navEl) navEl.classList.add('active');
    document.querySelectorAll('.bn-item').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === name)
    );
    history.replaceState(null, '', '#' + name);
    if (name === 'apostas') loadApostas();
    if (name === 'painel')  loadPainel();
    animateTab(name);
  }

  onAuthChange(user => {
    if (user) {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appShell').style.display   = 'flex';
      const email = user.email || '';
      document.getElementById('userEmailDisplay').textContent = email;
      document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase() || '?';
      initAnalise();
      const hash = location.hash.replace('#', '');
      switchTab(['analise','apostas','painel'].includes(hash) ? hash : 'analise');
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appShell').style.display   = 'none';
    }
  });

  function showToast(msg, duration = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }
</script>
</body>
</html>
